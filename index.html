<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
<title>KSV – Live Manager Pro</title>
<style>
  :root{ 
    --blue:#003f8c; --red:#e30613; --bg:#0f172a; --card:#1e293b; 
    --border:#334155; --text:#f8fafc; --text-dim:#94a3b8;
    --win:#22c55e; --amber:#f59e0b;
  }
  *{box-sizing:border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent;}
  body{ margin:0; padding:10px; background: var(--bg); color:var(--text); line-height: 1.5; }
  .container { max-width: 1650px; margin: 0 auto; display: none; } 

  /* Messenger */
  .msg-center { 
    background: var(--card); border: 1px solid var(--blue); border-radius: 20px; 
    padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  .msg-list { max-height: 150px; overflow-y: auto; margin-bottom: 15px; display: flex; flex-direction: column; gap: 8px; }
  .msg-item { padding: 10px 15px; border-radius: 10px; font-size: 0.85rem; border-left: 4px solid var(--blue); background: rgba(255,255,255,0.03); }
  .msg-item.broadcast { border-left-color: var(--amber); }
  .msg-input-group { display: flex; gap: 10px; flex-wrap: wrap; }
  .msg-input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; }

  /* Header & Panel */
  .header{ display:flex; align-items:center; justify-content:space-between; margin-bottom: 20px; background: linear-gradient(135deg, var(--blue), #001f44); padding: 25px; border-radius: 20px; border: 1px solid var(--border); }
  .admin-panel { background: rgba(96, 165, 250, 0.05); padding: 20px; border-radius: 20px; border: 1px solid var(--blue); margin-bottom: 20px; }
  
  .ticker-card { background: var(--card); border: 2px solid #60a5fa; border-radius: 20px; padding: 20px; margin-bottom: 20px; text-align: center; }
  .ticker-val { font-size: 2.5rem; font-weight: 900; color: #fff; font-variant-numeric: tabular-nums; }
  
  .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat-mini { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }

  .main-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
  @media (min-width: 1200px) { .main-grid { grid-template-columns: 1.8fr 1.2fr; } }
  
  .table-container { background: var(--card); border-radius: 20px; padding: 15px; border: 1px solid var(--border); overflow-x: auto; }
  .match-table { width:100%; border-collapse:collapse; min-width: 600px; }
  .match-table th { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; padding: 10px; border-bottom: 1px solid var(--border); }
  .match-table td { padding: 12px 5px; border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: middle; text-align: center; }
  
  .logo-img { width: 28px; height: 28px; object-fit: contain; vertical-align: middle; }
  .score-box { background: #0f172a; padding: 5px 0; border-radius: 8px; width: 60px; display: inline-block; font-weight: 800; border: 1px solid var(--border); }
  
  .name-tag { font-size: 0.65rem; font-weight: 700; padding: 2px 6px; border-radius: 4px; display: inline-flex; align-items: center; gap: 4px; margin: 2px; }
  .tag-confirmed { background: var(--win); color: #000; }
  .tag-request { background: var(--amber); color: #000; }
  .deadline-info { display: block; font-size: 0.6rem; color: var(--text-dim); margin-top: 4px; font-style: italic; }
  .expired { color: var(--red) !important; font-weight: bold; }

  .btn-mini { border:none; border-radius:4px; padding:1px 4px; cursor:pointer; font-size: 0.6rem; font-weight: 900; }
  .btn-action { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 800; }
  .btn-zusage { background: var(--blue); color: #fff; border: none; padding: 8px 12px; border-radius: 8px; font-weight: 800; cursor: pointer; width: 100%; }
  .btn-zusage:disabled { background: #334155; cursor: not-allowed; opacity: 0.5; }
</style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2>KSV Dashboard</h2>
        <input type="password" id="passInput" placeholder="Passwort...">
        <button class="btn-action" style="width:100%" onclick="checkLogin()">LOGIN</button>
    </div>
</div>

<div class="container" id="mainApp">
  <div class="header">
    <div>
        <h2 id="viewTitle">KSV LIVE MANAGER</h2>
        <div id="statusInfo">Synchronisierung...</div>
    </div>
    <button class="btn-action" style="background:var(--red)" onclick="logout()">LOGOUT</button>
  </div>

  <div class="msg-center" id="msgCenter">
      <h3 style="margin:0 0 10px 0; font-size: 1rem; color: #60a5fa;">💬 NACHRICHTEN</h3>
      <div class="msg-list" id="msgList"></div>
      <div class="msg-input-group">
          <select id="msgTarget" style="display:none; background:var(--bg); color:white; border-radius:8px; padding:5px;"></select>
          <input type="text" id="msgInput" class="msg-input" placeholder="Nachricht schreiben...">
          <button class="btn-action" onclick="sendMessage()">SENDEN</button>
      </div>
  </div>

  <div class="admin-panel" id="adminTools">
    <div style="display:flex; gap:10px; flex-wrap: wrap;">
        <select id="companionSelect" style="flex:1"></select>
        <button class="btn-action" onclick="copyLink()">LINK KOPIEREN</button>
        <button class="btn-action" style="background:var(--red);" onclick="clearCloud()">RESET CLOUD</button>
    </div>
  </div>

  <div class="ticker-card">
    <div id="liveTicker" class="ticker-val">00t 00h 00m 00s</div>
    <div style="color:var(--text-dim); font-size: 0.7rem; text-transform: uppercase;">Abwesenheit vom Stadion</div>
  </div>

  <div class="stats-bar">
    <div class="stat-mini"><span>Besuche</span><b id="statCount">-</b></div>
    <div class="stat-mini"><span>Status</span><b id="statStatus">Aktiv</b></div>
    <div class="stat-mini"><span>Zukünftig</span><b id="statTotal">-</b></div>
    <div class="stat-mini"><span>Zuletzt vor</span><b id="statDays">-</b></div>
  </div>

  <div class="main-grid">
    <div class="table-container">
      <h3>📅 SPIELPLAN</h3>
      <table class="match-table" id="matchTable">
        <thead><tr><th>Datum</th><th>Ort</th><th style="text-align:right">Heim</th><th>Score</th><th style="text-align:left">Gast</th><th>Status / Aktion</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
    <div class="table-container" id="companionSection">
        <h3>👤 BEGLEITER-RANKING</h3>
        <table id="companionTable" style="width:100%; border-collapse:collapse;">
          <thead><tr style="color:var(--text-dim); font-size: 0.6rem;"><th>NAME</th><th>SPIELE</th><th>ZULETZT</th></tr></thead>
          <tbody></tbody>
        </table>
    </div>
  </div>
</div>

<script>
const ADMIN_PASSWORD = "KSV"; 
const NPOINT_ID = "15abfbbebe2742f743b2"; 
const DB_URL = `https://api.npoint.io/${NPOINT_ID}`;

let data = [], CloudDB = { zusagen: [], msgs: [] }, filters = {companion: null}, tickerInterval = null, isAdminMode = false;

window.onload = async () => {
    const params = new URLSearchParams(window.location.search);
    const user = params.get('user');
    if(user) { 
        filters.companion = decodeURIComponent(user); 
        document.getElementById("viewTitle").innerText = "Moin, " + filters.companion + "!";
        showApp(false); 
    }
};

function checkLogin() {
    if(document.getElementById("passInput").value === ADMIN_PASSWORD) {
        isAdminMode = true;
        document.getElementById("msgTarget").style.display = "block";
        showApp(true);
    } else alert("Falsch!");
}

async function showApp(isAdmin) {
    document.getElementById("loginOverlay").style.display = "none";
    document.getElementById("mainApp").style.display = "block";
    if(!isAdmin) document.getElementById("adminTools").style.display = "none";
    await refreshData();
}

async function refreshData() {
    try {
        const [resExcel, resCloud] = await Promise.all([
            fetch('daten.json?v=' + Date.now()),
            fetch(DB_URL)
        ]);
        const excelJson = await resExcel.json();
        CloudDB = await resCloud.json();
        if(!CloudDB.zusagen) CloudDB.zusagen = [];
        if(!CloudDB.msgs) CloudDB.msgs = [];
        
        data = excelJson.map(r => ({
            fD: parseFixDate(r["Datum"] || r["datum"], r["Uhrzeit"] || r["uhrzeit"]),
            datum: r["Datum"] || r["datum"], 
            gegner: r["Gegner"], 
            meinVerein: r["Mein Verein"],
            ort: (r["Ort"] || "H").toUpperCase(),
            tK: r["Tore Kiel"] || "", 
            tG: r["Tore Gegner"] || "",
            played: r["Status"] === "Abgeschlossen",
            begleiter: (r["Begleiter"] || "").trim()
        }));
        
        render();
        renderMessages();
    } catch (e) { console.error(e); }
}

function parseFixDate(dStr, tStr) {
    if (!dStr) return new Date();
    let clean = dStr.includes(',') ? dStr.split(',')[1].trim() : dStr.trim();
    const parts = clean.split('/');
    let dO = new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
    if (tStr) {
        const tp = tStr.replace(' Uhr', '').split(':');
        if(tp.length >= 2) dO.setHours(tp[0], tp[1], 0);
    }
    return dO;
}

function renderMessages() {
    const list = document.getElementById("msgList");
    let visible = isAdminMode ? CloudDB.msgs : CloudDB.msgs.filter(m => m.to === "Alle" || m.to === filters.companion || m.from === filters.companion);
    list.innerHTML = visible.length ? visible.reverse().map(m => `<div class="msg-item"><b>${m.from}:</b> ${m.txt} <small>(${m.time})</small></div>`).join("") : "Keine Nachrichten.";
}

async function sendMessage() {
    const input = document.getElementById("msgInput");
    if(!input.value.trim()) return;
    CloudDB.msgs.push({
        from: isAdminMode ? "Admin" : filters.companion,
        to: isAdminMode ? document.getElementById("msgTarget").value : "Admin",
        txt: input.value.trim(),
        time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
    });
    await saveToCloud();
    input.value = "";
    renderMessages();
}

function render() {
    const now = new Date();
    data.sort((a,b) => b.fD - a.fD);
    const playedPast = data.filter(d => d.played);
    const userHistory = playedPast.filter(m => m.begleiter.includes(filters.companion || "---"));
    
    // Ticker
    if (userHistory.length > 0) {
        const lastVisit = userHistory[0].fD;
        if(tickerInterval) clearInterval(tickerInterval);
        tickerInterval = setInterval(() => {
            const diff = Math.max(0, new Date() - lastVisit);
            const d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
            document.getElementById("liveTicker").innerText = `${d}t ${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
        }, 1000);
        document.getElementById("statDays").innerText = Math.floor((now - lastVisit)/86400000) + " T.";
    }

    const tbody = document.getElementById("matchTable").querySelector("tbody");
    tbody.innerHTML = data.map(m => {
        const isFuture = !m.played && m.fD > now;
        const confirmed = m.begleiter ? m.begleiter.split(/,| und /).map(n => n.trim()).filter(n => n && n.toLowerCase() !== 'nicht im stadion') : [];
        const isUserConf = confirmed.includes(filters.companion);
        const requests = CloudDB.zusagen.filter(z => z.date === m.datum).map(z => z.user);
        
        if(filters.companion && !isFuture && !isUserConf) return "";

        // DEADLINE BERECHNUNG
        let deadlineDate = new Date(m.fD);
        deadlineDate.setDate(deadlineDate.getDate() - (m.ort === 'A' ? 7 : 3));
        const isExpired = now > deadlineDate;
        const deadlineStr = deadlineDate.toLocaleDateString('de-DE', {day:'2-digit', month:'2-digit'});

        let actionHtml = "";
        if(filters.companion) {
            if(isFuture) {
                if(isUserConf) actionHtml = '<span class="name-tag tag-confirmed">BESTÄTIGT ✅</span>';
                else if(requests.includes(filters.companion)) actionHtml = '<span class="name-tag tag-request">ANGEFRAGT...</span>';
                else {
                    actionHtml = `<button class="btn-zusage" ${isExpired ? 'disabled' : ''} onclick="submitZusage('${m.datum}', '${m.gegner}')">${isExpired ? 'FRIST ABGELAUFEN' : 'DABEI!'}</button>`;
                }
                actionHtml += `<span class="deadline-info ${isExpired ? 'expired' : ''}">Frist: bis ${deadlineStr}.</span>`;
            } else if(isUserConf) actionHtml = 'Dabei';
        } else {
            let tags = confirmed.map(n => `<span class="name-tag tag-confirmed">${n}</span>`).join("");
            let reqs = requests.map(n => `<span class="name-tag tag-request">? ${n} <button class="btn-mini" onclick="handleReq('${m.datum}','${n}',true)">✔</button></span>`).join("");
            actionHtml = tags + reqs + (isFuture ? `<span class="deadline-info">Frist: ${deadlineStr}.</span>` : "");
        }

        const h = m.ort==='H'?m.meinVerein:m.gegner; 
        const g = m.ort==='A'?m.meinVerein:m.gegner;

        return `<tr class="${isFuture ? 'future-row' : ''}">
            <td style="font-size:0.7rem">${m.datum}</td>
            <td>${m.ort}</td>
            <td style="text-align:right"><b>${h}</b> <img src="logos/${h}.png" class="logo-img" onerror="this.style.display='none'"></td>
            <td><div class="score-box">${m.played ? (m.ort=='H'?m.tK+':'+m.tG:m.tG+':'+m.tK) : '-:-'}</div></td>
            <td style="text-align:left"><img src="logos/${g}.png" class="logo-img" onerror="this.style.display='none'"> <b>${g}</b></td>
            <td>${actionHtml}</td>
        </tr>`;
    }).join("");

    if(isAdminMode) {
        const comps = {};
        data.forEach(m => { if(m.begleiter && m.played) m.begleiter.split(/,| und /).forEach(n => {
            const name = n.trim(); if(!name || name === "nicht im stadion") return;
            if(!comps[name]) comps[name] = {sp:0, last:null}; comps[name].sp++; comps[name].last = m.fD;
        })});
        const sn = Object.keys(comps).sort();
        document.getElementById("companionSelect").innerHTML = sn.map(n => `<option value="${n}">${n}</option>`).join("");
        document.getElementById("msgTarget").innerHTML = '<option value="Alle">Alle</option>' + sn.map(n => `<option value="${n}">${n}</option>`).join("");
        document.getElementById("companionTable").querySelector("tbody").innerHTML = Object.entries(comps).sort((a,b)=>b[1].sp-a[1].sp).map(([n,s])=>`<tr><td>${n}</td><td>${s.sp}x</td><td>${Math.floor((now-s.last)/86400000)}T.</td></tr>`).join("");
        document.getElementById("statCount").innerText = playedPast.length;
    }
}

async function submitZusage(d, g) {
    CloudDB.zusagen.push({ user: filters.companion, date: d });
    CloudDB.msgs.push({ from: filters.companion, to: "Admin", txt: `Anfrage für ${g} am ${d}`, time: new Date().toLocaleTimeString() });
    await saveToCloud(); refreshData();
}

async function handleReq(d, u, acc) {
    CloudDB.zusagen = CloudDB.zusagen.filter(z => !(z.date===d && z.user===u));
    CloudDB.msgs.push({ from: "Admin", to: u, txt: `Anfrage für ${d} bestätigt!`, time: new Date().toLocaleTimeString() });
    await saveToCloud(); refreshData();
}

async function saveToCloud() { await fetch(DB_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(CloudDB) }); }
async function clearCloud() { if(confirm("Reset?")) { CloudDB={zusagen:[],msgs:[]}; await saveToCloud(); refreshData(); } }
function copyLink() { navigator.clipboard.writeText(window.location.origin + window.location.pathname + "?user=" + encodeURIComponent(document.getElementById("companionSelect").value)); alert("Kopiert!"); }
function logout() { window.location.href = window.location.pathname; }
</script>
</body>
</html>
