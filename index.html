<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
<title>KSV – Live Manager</title>
<style>
  :root{ 
    --blue:#003f8c; --red:#e30613; --bg:#0f172a; --card:#1e293b; 
    --border:#334155; --text:#f8fafc; --text-dim:#94a3b8;
    --win:#22c55e; --amber:#f59e0b;
  }
  *{box-sizing:border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent;}
  body{ margin:0; padding:10px; background: var(--bg); color:var(--text); line-height: 1.5; }
  .container { max-width: 1650px; margin: 0 auto; display: none; } 

  @media (max-width: 600px) {
    .header { padding: 15px !important; flex-direction: column; gap: 15px; text-align: center; }
    .ticker-val { font-size: 1.6rem !important; }
    .stats-bar { grid-template-columns: 1fr 1fr !important; }
  }

  #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); display:flex; align-items:center; justify-content:center; z-index:9999; flex-direction: column; padding: 20px; }
  .login-box { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--border); text-align:center; width: 100%; max-width: 350px; }
  input[type="password"], select { background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 10px; width: 100%; margin-bottom: 20px; text-align: center; outline: none; }
  .btn-action { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 800; width: 100%; }
  
  .header{ display:flex; align-items:center; justify-content:space-between; margin-bottom: 20px; background: linear-gradient(135deg, var(--blue), #001f44); padding: 25px; border-radius: 20px; border: 1px solid var(--border); }
  .admin-panel { background: rgba(96, 165, 250, 0.05); padding: 20px; border-radius: 20px; border: 1px solid var(--blue); margin-bottom: 20px; }
  
  .ticker-card { background: var(--card); border: 2px solid #60a5fa; border-radius: 20px; padding: 20px; margin-bottom: 20px; text-align: center; }
  .ticker-val { font-size: 2.5rem; font-weight: 900; color: #fff; font-variant-numeric: tabular-nums; }
  
  .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat-mini { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
  .stat-mini span { display: block; font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; }
  .stat-mini b { font-size: 1.1rem; color: #fff; }

  .table-container { background: var(--card); border-radius: 20px; padding: 15px; border: 1px solid var(--border); overflow-x: auto; }
  .match-table { width:100%; border-collapse:collapse; min-width: 600px; }
  .match-table th { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; padding: 10px; border-bottom: 1px solid var(--border); }
  .match-table td { padding: 12px 5px; border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: middle; text-align: center; }
  
  .logo-img { width: 28px; height: 28px; object-fit: contain; }
  .score-box { background: #0f172a; padding: 5px 0; border-radius: 8px; width: 65px; display: inline-block; font-weight: 800; border: 1px solid var(--border); }
  .name-tag { font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 4px; display: inline-block; }
  .tag-confirmed { background: var(--win); color: #000; }
  .tag-request { background: var(--amber); color: #000; font-style: italic; }
  
  .btn-zusage { background: var(--win); color: #000; border: none; padding: 6px 12px; border-radius: 6px; font-weight: 900; font-size: 0.65rem; cursor: pointer; }
  .future-row { opacity: 0.85; }
</style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2 style="margin-bottom:20px;">KSV Login</h2>
        <input type="password" id="passInput" placeholder="Passwort...">
        <button class="btn-action" onclick="checkLogin()">LOGIN</button>
    </div>
</div>

<div class="container" id="mainApp">
  <div class="header">
    <div>
        <h2 style="margin:0; font-size: 1.4rem;">KSV <span style="color:var(--red)">LOG MASTER</span></h2>
        <div id="statusInfo" style="color:var(--text-dim); font-size: 0.75rem;">Daten werden geladen...</div>
    </div>
    <button class="btn-action" style="width:auto; padding: 8px 20px; background:var(--red)" onclick="logout()">LOGOUT</button>
  </div>

  <div class="admin-panel" id="adminTools">
    <div style="display:flex; gap:10px; flex-wrap: wrap;">
        <select id="companionSelect" style="margin:0; flex:1; min-width: 200px;"></select>
        <button class="btn-action" style="width:auto;" onclick="copyLink()">LINK KOPIEREN</button>
        <button class="btn-action" style="width:auto; background:var(--red);" onclick="clearCloud()">RESET CLOUD</button>
    </div>
  </div>

  <div class="ticker-card">
    <div id="liveTicker" class="ticker-val">00t 00h 00m 00s</div>
    <div id="tickerTitle" style="color:var(--text-dim); font-size: 0.7rem; text-transform: uppercase;">Abwesenheit vom Stadion</div>
  </div>

  <div class="stats-bar">
    <div class="stat-mini"><span>Ø Frequenz</span><b id="statFreq">-</b></div>
    <div class="stat-mini"><span>Ø Pause</span><b id="statGap">-</b></div>
    <div class="stat-mini"><span>Max Lücke</span><b id="statMax">-</b></div>
    <div class="stat-mini"><span>Spiele</span><b id="statCount">-</b></div>
  </div>

  <div class="table-container">
    <h3>📅 SPIELPLAN & BEGLEITER</h3>
    <table class="match-table" id="matchTable">
      <thead><tr><th>Datum</th><th>Ort</th><th style="text-align:right">Heim</th><th>Score</th><th style="text-align:left">Gast</th><th>Dabei / Anfragen</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
const ADMIN_PASSWORD = "KSV"; 
const NPOINT_ID = "15abfbbebe2742f743b2"; 
const DB_URL = `https://api.npoint.io/${NPOINT_ID}`;

let data = [], ZusagenCloud = [], filters = {companion: null}, tickerInterval = null;

window.onload = async () => {
    const params = new URLSearchParams(window.location.search);
    const user = params.get('user');
    if(user) { filters.companion = decodeURIComponent(user); showApp(false); }
};

function checkLogin() {
    if(document.getElementById("passInput").value === ADMIN_PASSWORD) showApp(true);
    else alert("Falsch!");
}

async function showApp(isAdmin) {
    document.getElementById("loginOverlay").style.display = "none";
    document.getElementById("mainApp").style.display = "block";
    if(!isAdmin) document.getElementById("adminTools").style.display = "none";
    await refreshData();
}

async function refreshData() {
    try {
        const [resEx, resCl] = await Promise.all([fetch('daten.json?v='+Date.now()), fetch(DB_URL)]);
        const exJ = await resEx.json();
        const clJ = await resCl.json();
        ZusagenCloud = clJ.zusagen || [];
        data = exJ.map(r => ({
            fD: parseFixDate(r["Datum"] || r["datum"], r["Uhrzeit"] || r["uhrzeit"]),
            datum: r["Datum"] || r["datum"], gegner: r["Gegner"], meinVerein: r["Mein Verein"],
            ort: (r["Ort"] || "H").toUpperCase(),
            tK: r["Tore Kiel"] || 0, tG: r["Tore Gegner"] || 0,
            played: r["Tore Kiel"] !== undefined && r["Tore Kiel"] !== "" && r["Tore Kiel"] !== "-:-",
            begleiter: (r["Begleiter"] || "").trim()
        }));
        render();
        document.getElementById("statusInfo").innerText = "Daten synchronisiert";
    } catch (e) { document.getElementById("statusInfo").innerText = "Ladefehler!"; }
}

function parseFixDate(dStr, tStr) {
    if (!dStr) return new Date();
    let clean = dStr.replace(/^[a-zA-Z]{2,3},\s/, '').trim();
    const p = clean.split(/[./]/);
    let dO = p.length === 3 ? new Date(p[2], p[1]-1, p[0]) : new Date(clean);
    if (tStr && tStr.includes(':')) { const tp = tStr.split(':'); dO.setHours(tp[0], tp[1], 0, 0); }
    else { dO.setHours(15, 30, 0, 0); }
    return dO;
}

function render() {
    const now = new Date();
    data.sort((a,b) => b.fD - a.fD);
    
    // STATS & TICKER Logik
    const playedPast = data.filter(d => d.played && d.fD <= now).sort((a,b) => a.fD - b.fD);
    const relevant = filters.companion ? 
        playedPast.filter(m => m.begleiter.includes(filters.companion)) : 
        playedPast.filter(m => m.begleiter !== "" && m.begleiter.toLowerCase() !== "nicht im stadion");

    if (relevant.length > 0) {
        const lastVisit = relevant[relevant.length-1].fD;
        const firstVisit = relevant[0].fD;
        
        // Fülle Reiter oben
        document.getElementById("statCount").innerText = relevant.length;
        let gaps = [];
        for(let i=1; i<relevant.length; i++) gaps.push(Math.max(0, (relevant[i].fD - relevant[i-1].fD)/86400000));
        if(gaps.length > 0) {
            document.getElementById("statMax").innerText = Math.floor(Math.max(...gaps)) + " T.";
            document.getElementById("statGap").innerText = Math.floor(gaps.reduce((a,b)=>a+b,0)/gaps.length) + " T.";
        }
        document.getElementById("statFreq").innerText = Math.floor(((now - firstVisit)/86400000)/relevant.length) + " T.";

        if(tickerInterval) clearInterval(tickerInterval);
        tickerInterval = setInterval(() => {
            const diff = Math.max(0, now - lastVisit);
            const d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
            document.getElementById("liveTicker").innerText = `${d}t ${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
        }, 1000);
    }

    // TABELLE RENDERN
    const tbody = document.getElementById("matchTable").querySelector("tbody");
    tbody.innerHTML = data.map(m => {
        const isFuture = m.fD > now;
        const confirmedList = m.begleiter.split(/,| und /).map(n => n.trim());
        const isConfirmed = confirmedList.includes(filters.companion || "");
        const requests = ZusagenCloud.filter(z => z.date === m.datum).map(z => z.user);
        const hasRequested = requests.includes(filters.companion);

        // Filter: In Begleiter-Ansicht nur eigene vergangene ODER alle zukünftigen
        if(filters.companion && !isConfirmed && !isFuture) return "";

        let statusHtml = "";
        if(filters.companion) {
            if(isFuture) {
                statusHtml = isConfirmed ? '<span class="name-tag tag-confirmed">BESTÄTIGT</span>' : (hasRequested ? '<span class="name-tag tag-request">ANGEFRAGT...</span>' : `<button class="btn-zusage" onclick="submitZusage('${m.datum}')">DABEI!</button>`);
            } else {
                statusHtml = isConfirmed ? '✅' : '❌';
            }
        } else {
            let tags = confirmedList.filter(n => n!=="").map(n => `<span class="name-tag tag-confirmed">${n}</span>`).join(" ");
            let reqs = requests.filter(n => !confirmedList.includes(n)).map(n => `<span class="name-tag tag-request">? ${n}</span>`).join(" ");
            statusHtml = tags + reqs;
        }

        return `<tr class="${isFuture ? 'future-row' : ''}">
            <td style="font-size:0.7rem">${m.datum}</td><td>${m.ort}</td>
            <td style="text-align:right"><b>${m.ort=='H'?m.meinVerein:m.gegner}</b></td>
            <td><div class="score-box">${m.played && !isFuture ? (m.ort=='H'?m.tK+':'+m.tG:m.tG+':'+m.tK) : '-:-'}</div></td>
            <td style="text-align:left"><b>${m.ort=='A'?m.meinVerein:m.gegner}</b></td>
            <td>${statusHtml}</td>
        </tr>`;
    }).join("");

    // Dropdown füllen (Admin)
    if(!filters.companion) {
        let allNames = new Set();
        data.forEach(m => m.begleiter.split(/,| und /).forEach(n => { if(n.trim()) allNames.add(n.trim()); }));
        document.getElementById("companionSelect").innerHTML = '<option value="">Wähle Begleiter...</option>' + Array.from(allNames).sort().map(n => `<option value="${n}">${n}</option>`).join("");
    }
}

async function submitZusage(datum) {
    if(!filters.companion) return;
    if(ZusagenCloud.some(z => z.user === filters.companion && z.date === datum)) return alert("Bereits angefragt!");
    ZusagenCloud.push({ user: filters.companion, date: datum });
    await fetch(DB_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ zusagen: ZusagenCloud }) });
    alert("Anfrage gesendet!"); refreshData();
}

async function clearCloud() {
    if(confirm("Alle Zusagen löschen?")) {
        await fetch(DB_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ zusagen: [] }) });
        refreshData();
    }
}

function copyLink() {
    const n = document.getElementById("companionSelect").value;
    if(!n) return alert("Name wählen!");
    const url = window.location.href.split('?')[0] + "?user=" + encodeURIComponent(n);
    navigator.clipboard.writeText(url).then(() => alert("Link kopiert!"));
}
function logout() { window.location.href = window.location.pathname; }
</script>
</body>
</html>
