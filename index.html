<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
<title>KSV – Live Manager Pro</title>
<style>
  :root{ 
    --blue:#003f8c; --red:#e30613; --bg:#0f172a; --card:#1e293b; 
    --border:#334155; --text:#f8fafc; --text-dim:#94a3b8;
    --win:#22c55e; --amber:#f59e0b;
  }
  *{box-sizing:border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent;}
  body{ margin:0; padding:10px; background: var(--bg); color:var(--text); line-height: 1.5; }
  .container { max-width: 1650px; margin: 0 auto; display: none; } 

  /* Login & Overlays */
  #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); display:flex; align-items:center; justify-content:center; z-index:9999; flex-direction: column; padding: 20px; }
  .login-box { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--border); text-align:center; width: 100%; max-width: 380px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
  input[type="password"], input[type="text"], select { background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 10px; width: 100%; margin-bottom: 15px; text-align: center; }
  .btn-action { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 800; width: 100%; transition: 0.2s; }
  
  /* Header */
  .header{ display:flex; align-items:center; justify-content:space-between; margin-bottom: 20px; background: linear-gradient(135deg, var(--blue), #001f44); padding: 25px; border-radius: 20px; border: 1px solid var(--border); }
  
  /* NEUES POSTFACH DESIGN */
  .msg-center { background: var(--card); border: 1px solid var(--blue); border-radius: 20px; padding: 20px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 15px; }
  .msg-layout { display: grid; grid-template-columns: 200px 1fr; gap: 15px; min-height: 300px; }
  @media (max-width: 768px) { .msg-layout { grid-template-columns: 1fr; } }
  
  .msg-sidebar { border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 5px; overflow-y: auto; max-height: 400px; }
  .chat-tab { padding: 10px; border-radius: 10px; cursor: pointer; background: rgba(255,255,255,0.03); font-size: 0.85rem; border: 1px solid transparent; display: flex; justify-content: space-between; align-items: center; }
  .chat-tab.active { background: var(--blue); border-color: #60a5fa; }
  .unread-dot { width: 8px; height: 8px; background: var(--red); border-radius: 50%; }

  .msg-content { display: flex; flex-direction: column; background: rgba(0,0,0,0.2); border-radius: 15px; padding: 15px; }
  .msg-list { flex: 1; max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; padding-right: 5px; }
  
  .msg-bubble { max-width: 85%; padding: 10px 15px; border-radius: 15px; font-size: 0.85rem; position: relative; }
  .msg-bubble.admin { align-self: flex-end; background: var(--blue); border-bottom-right-radius: 2px; }
  .msg-bubble.user { align-self: flex-start; background: var(--border); border-bottom-left-radius: 2px; }
  .msg-meta { font-size: 0.65rem; color: var(--text-dim); margin-top: 5px; display: block; text-align: right; }

  /* Restliches Layout */
  .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat-mini { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
  .stat-mini b { display: block; font-size: 1.1rem; color: #fff; margin-top: 10px; }

  .table-container { background: var(--card); border-radius: 20px; padding: 15px; border: 1px solid var(--border); overflow-x: auto; }
  .match-table { width:100%; border-collapse:collapse; min-width: 600px; }
  .match-table td { padding: 12px 5px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; }
  
  .name-tag { font-size: 0.65rem; font-weight: 700; padding: 2px 6px; border-radius: 4px; display: inline-flex; margin: 2px; }
  .tag-confirmed { background: var(--win); color: #000; }
  .ticker-val { font-size: 2.5rem; font-weight: 900; color: #fff; text-align: center; margin-bottom: 10px; }
</style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2 id="loginTitle">KSV Dashboard</h2>
        <p id="loginDesc" style="font-size: 0.8rem; color: var(--text-dim); margin-bottom: 20px;">Initialisierung...</p>
        <input type="password" id="passInput" placeholder="Passwort...">
        <button class="btn-action" onclick="handleAuth()">LOGIN</button>
    </div>
</div>

<div class="container" id="mainApp">
  <div class="header">
    <div>
        <h2 id="viewTitle">KSV LIVE MANAGER</h2>
        <div id="statusInfo">Daten synchron...</div>
    </div>
    <button class="btn-action" style="width:auto; background:var(--red)" onclick="logout()">LOGOUT</button>
  </div>

  <div class="msg-center">
      <h3 style="margin:0; font-size: 1rem; color: #60a5fa;">💬 POSTFACH</h3>
      <div class="msg-layout">
          <div class="msg-sidebar" id="chatSidebar">
              </div>
          <div class="msg-content">
              <div class="msg-list" id="msgList">
                  <p style="color:var(--text-dim); text-align:center;">Wähle einen Chat aus...</p>
              </div>
              <div style="display:flex; gap:10px;">
                  <input type="text" id="msgInput" style="flex:1; margin:0;" placeholder="Nachricht schreiben...">
                  <button class="btn-action" style="width:auto;" onclick="sendMessage()">SENDEN</button>
              </div>
          </div>
      </div>
  </div>

  <div class="admin-panel" id="adminTools" style="display:none;">
    <div style="display:flex; gap:10px; flex-wrap: wrap;">
        <select id="companionSelect" style="flex:1; margin:0;"></select>
        <button class="btn-action" style="width:auto;" onclick="copyLink()">LINK KOPIEREN</button>
        <button class="btn-action" style="width:auto; background:var(--red);" onclick="clearCloud()">RESET SYSTEM</button>
    </div>
  </div>

  <div class="ticker-card" style="background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid var(--border);">
    <div id="liveTicker" class="ticker-val">00t 00h 00m 00s</div>
  </div>

  <div class="stats-bar">
    <div class="stat-mini"><span>Besuche</span><b id="statCount">-</b></div>
    <div class="stat-mini"><span>Status</span><b id="statStatus">Aktiv</b></div>
    <div class="stat-mini"><span>Zukünftig</span><b id="statTotal">-</b></div>
    <div class="stat-mini"><span>Zuletzt vor</span><b id="statDays">-</b></div>
  </div>

  <div class="table-container">
    <h3>📅 SPIELPLAN</h3>
    <table class="match-table" id="matchTable">
      <thead><tr><th>Datum</th><th>Ort</th><th style="text-align:right">Heim</th><th>Score</th><th style="text-align:left">Gast</th><th>Aktion</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
  
  <div id="adminSections" style="display:none; margin-top:20px; display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
    <div class="table-container"><h3>👤 RANKING</h3><table id="companionTable" style="width:100%;"><thead><tr><th>NAME</th><th>SPIELE</th></tr></thead><tbody></tbody></table></div>
    <div class="table-container"><h3>🔑 USER-STATUS</h3><table id="userTable" style="width:100%;"><thead><tr><th>BEGLEITER</th><th>ID-LINK</th></tr></thead><tbody></tbody></table></div>
  </div>
</div>

<script>
const FALLBACK_ADMIN_HASH = "80f84501a359739070381373516422d369f688034d6f6e52003c200676450f3b"; 
const NPOINT_ID = "15abfbbebe2742f743b2"; 
const DB_URL = `https://api.npoint.io/${NPOINT_ID}`;

let data = [], CloudDB = { zusagen: [], msgs: [], users: {}, adminHash: null, userIds: {} }, filters = {companion: null}, isAdminMode = false, activeChat = "Alle";

window.onload = async () => {
    await refreshData();
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    if(id && CloudDB.userIds[id]) {
        filters.companion = CloudDB.userIds[id];
        activeChat = "Admin";
        document.getElementById("loginTitle").innerText = "Moin, " + filters.companion;
    } else {
        document.getElementById("loginTitle").innerText = "KSV Admin";
    }
};

async function hash(str) {
    const msgBuffer = new TextEncoder().encode(str);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function handleAuth() {
    const pw = document.getElementById("passInput").value;
    if(!pw) return alert("Passwort fehlt!");
    const pwHash = await hash(pw);
    const targetAdminHash = CloudDB.adminHash || FALLBACK_ADMIN_HASH;

    if(pwHash === targetAdminHash) { showApp(true); return; }
    if(filters.companion && (!CloudDB.users[filters.companion] || CloudDB.users[filters.companion] === pwHash)) {
        if(!CloudDB.users[filters.companion]) { CloudDB.users[filters.companion] = pwHash; await saveToCloud(); }
        showApp(false);
    } else { alert("Falsches Passwort!"); }
}

async function showApp(isAdmin) {
    isAdminMode = isAdmin;
    document.getElementById("loginOverlay").style.display = "none";
    document.getElementById("mainApp").style.display = "block";
    if(isAdmin) {
        document.getElementById("adminTools").style.display = "block";
        document.getElementById("adminSections").style.display = "grid";
    }
    render();
    renderMessages();
}

async function refreshData() {
    try {
        const [resExcel, resCloud] = await Promise.all([fetch('daten.json?v=' + Date.now()), fetch(DB_URL)]);
        const excelJson = await resExcel.json();
        CloudDB = await resCloud.json();
        if(!CloudDB.msgs) CloudDB.msgs = [];
        data = excelJson.map(r => ({
            fD: parseFixDate(r["Datum"] || r["datum"], r["Uhrzeit"] || r["uhrzeit"]),
            datum: r["Datum"] || r["datum"], gegner: r["Gegner"], meinVerein: r["Mein Verein"],
            ort: (r["Ort"] || "H").toUpperCase(), played: r["Status"] === "Abgeschlossen", begleiter: (r["Begleiter"] || "").trim()
        }));
    } catch(e) { console.error(e); }
}

function parseFixDate(d, t) {
    let clean = d.includes(',') ? d.split(',')[1].trim() : d.trim();
    const p = clean.split('/');
    let dO = new Date(p[2], p[1]-1, p[0]);
    if(t) { const tp = t.replace(' Uhr','').split(':'); dO.setHours(tp[0], tp[1], 0); }
    return dO;
}

// --- MESSENGER LOGIK ---
function renderMessages() {
    const sidebar = document.getElementById("chatSidebar");
    const list = document.getElementById("msgList");
    sidebar.innerHTML = "";

    if (isAdminMode) {
        // Sidebar für Admin: Alle Begleiter auflisten
        const usersInChat = [...new Set(Object.values(CloudDB.userIds))].sort();
        usersInChat.unshift("Alle");

        usersInChat.forEach(u => {
            const hasUnread = CloudDB.msgs.some(m => m.from === u && !m.read);
            const div = document.createElement("div");
            div.className = `chat-tab ${activeChat === u ? 'active' : ''}`;
            div.innerHTML = `<span>${u}</span> ${hasUnread ? '<div class="unread-dot"></div>' : ''}`;
            div.onclick = () => { activeChat = u; markAsRead(u); renderMessages(); };
            sidebar.appendChild(div);
        });
    } else {
        // Sidebar für Begleiter: Nur Admin Tab
        sidebar.innerHTML = `<div class="chat-tab active">Admin</div>`;
    }

    // Nachrichten filtern
    let chatPartner = isAdminMode ? activeChat : filters.companion;
    let filtered = CloudDB.msgs.filter(m => {
        if(isAdminMode) {
            return (m.from.startsWith(activeChat) || m.to === activeChat);
        } else {
            return (m.from.startsWith(filters.companion) || m.to === filters.companion || m.to === "Alle");
        }
    });

    list.innerHTML = filtered.length ? filtered.map(m => {
        const isMe = isAdminMode ? m.from.startsWith("Admin") : m.from.startsWith(filters.companion);
        return `<div class="msg-bubble ${isMe ? 'admin' : 'user'}">
            <div style="font-weight:bold; font-size:0.7rem; margin-bottom:3px;">${m.from}</div>
            ${m.txt}
            <span class="msg-meta">${m.time}</span>
        </div>`;
    }).join("") : `<p style="color:var(--text-dim); text-align:center;">Keine Nachrichten in ${activeChat}</p>`;
    list.scrollTop = list.scrollHeight;
}

async function sendMessage() {
    const input = document.getElementById("msgInput");
    if(!input.value) return;

    const now = new Date();
    const timeStr = now.toLocaleDateString('de-DE') + " " + now.toLocaleTimeString('de-DE', {hour: '2-digit', minute:'2-digit'});
    
    let senderLabel = isAdminMode ? `Admin < ${activeChat}` : `${filters.companion} < Admin`;

    CloudDB.msgs.push({ 
        from: senderLabel, 
        to: isAdminMode ? activeChat : "Admin", 
        txt: input.value, 
        time: timeStr,
        read: false
    });

    await saveToCloud();
    input.value = "";
    renderMessages();
}

async function markAsRead(user) {
    let changed = false;
    CloudDB.msgs.forEach(m => { if(m.from === user && !m.read) { m.read = true; changed = true; } });
    if(changed) await saveToCloud();
}

// --- REST RENDERING ---
function render() {
    const now = new Date();
    data.sort((a,b) => b.fD - a.fD);
    const playedPast = data.filter(d => d.played);
    const history = playedPast.filter(m => m.begleiter.includes(filters.companion || "---"));
    
    if(history.length > 0) {
        const last = history[0].fD;
        setInterval(() => {
            const diff = Math.max(0, new Date() - last);
            const d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
            document.getElementById("liveTicker").innerText = `${d}t ${h}h ${m}m ${s}s`;
        }, 1000);
    }

    const tbody = document.getElementById("matchTable").querySelector("tbody");
    tbody.innerHTML = data.map(m => {
        const isFuture = !m.played && m.fD > now;
        if(filters.companion && !isFuture && !m.begleiter.includes(filters.companion)) return "";
        return `<tr><td>${m.datum}</td><td>${m.ort}</td><td>${m.gegner}</td><td>-:-</td><td>${isFuture ? 'ZUKUNFT' : ''}</td></tr>`;
    }).join("");
}

async function saveToCloud() { await fetch(DB_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(CloudDB) }); }
function logout() { window.location.href = window.location.pathname; }
async function copyLink() {
    const name = document.getElementById("companionSelect").value;
    let id = Object.keys(CloudDB.userIds).find(key => CloudDB.userIds[key] === name) || Math.random().toString(36).substr(2, 6);
    CloudDB.userIds[id] = name; await saveToCloud();
    navigator.clipboard.writeText(window.location.origin + window.location.pathname + "?id=" + id);
    alert("Link kopiert!");
}
</script>
</body>
</html>
