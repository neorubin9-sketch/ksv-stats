<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
<title>KSV – Live Manager Pro</title>
<style>
  :root{ 
    --blue:#003f8c; --red:#e30613; --bg:#0f172a; --card:#1e293b; 
    --border:#334155; --text:#f8fafc; --text-dim:#94a3b8;
    --win:#22c55e; --amber:#f59e0b;
  }
  *{box-sizing:border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent;}
  body{ margin:0; padding:10px; background: var(--bg); color:var(--text); line-height: 1.5; }
  .container { max-width: 1650px; margin: 0 auto; display: none; } 

  /* Login Overlay */
  #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); display:flex; align-items:center; justify-content:center; z-index:9999; flex-direction: column; padding: 20px; }
  .login-box { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--border); text-align:center; width: 100%; max-width: 380px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
  input[type="password"], input[type="text"], select { background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 10px; width: 100%; margin-bottom: 15px; text-align: center; font-size: 1rem; }
  .btn-action { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 800; width: 100%; transition: 0.2s; }
  
  /* Header */
  .header{ display:flex; align-items:center; justify-content:space-between; margin-bottom: 20px; background: linear-gradient(135deg, var(--blue), #001f44); padding: 25px; border-radius: 20px; border: 1px solid var(--border); }
  
  /* Messenger / Postfach */
  .msg-center { background: var(--card); border: 1px solid var(--blue); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
  .msg-layout { display: grid; grid-template-columns: 220px 1fr; gap: 15px; min-height: 350px; }
  @media (max-width: 768px) { .msg-layout { grid-template-columns: 1fr; } }
  
  .msg-sidebar { border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; overflow-y: auto; max-height: 400px; padding-right: 10px; }
  .chat-tab { padding: 12px; border-radius: 12px; cursor: pointer; background: rgba(255,255,255,0.03); font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; }
  .chat-tab.active { background: var(--blue); border-color: #60a5fa; }
  .unread-dot { width: 10px; height: 10px; background: var(--red); border-radius: 50%; box-shadow: 0 0 5px var(--red); }

  .msg-content { display: flex; flex-direction: column; background: rgba(15, 23, 42, 0.5); border-radius: 15px; padding: 15px; border: 1px solid var(--border); }
  .msg-list { flex: 1; max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; padding-right: 10px; }
  
  .msg-bubble { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 0.85rem; line-height: 1.4; }
  .msg-bubble.me { align-self: flex-end; background: var(--blue); border-bottom-right-radius: 2px; }
  .msg-bubble.them { align-self: flex-start; background: var(--border); border-bottom-left-radius: 2px; }
  .msg-meta { font-size: 0.6rem; color: var(--text-dim); margin-top: 5px; display: block; }

  /* Stats & Tables */
  .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat-mini { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
  .stat-mini b { display: block; font-size: 1.2rem; color: #fff; margin-top: 5px; }
  .ticker-val { font-size: 2.2rem; font-weight: 900; color: #fff; text-align: center; margin-bottom: 5px; }

  .table-container { background: var(--card); border-radius: 20px; padding: 15px; border: 1px solid var(--border); overflow-x: auto; margin-bottom: 20px; }
  .match-table { width:100%; border-collapse:collapse; min-width: 600px; }
  .match-table td, .match-table th { padding: 12px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .tag-confirmed { background: var(--win); color: #000; font-weight: 700; padding: 3px 8px; border-radius: 5px; font-size: 0.7rem; }
  .tag-request { background: var(--amber); color: #000; font-weight: 700; padding: 3px 8px; border-radius: 5px; font-size: 0.7rem; }
</style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2 id="loginTitle">KSV Dashboard</h2>
        <p id="loginDesc" style="font-size: 0.8rem; color: var(--text-dim); margin-bottom: 20px;">Lade Daten...</p>
        <input type="password" id="passInput" placeholder="Passwort...">
        <button class="btn-action" onclick="handleAuth()">LOGIN</button>
    </div>
</div>

<div class="container" id="mainApp">
  <div class="header">
    <div>
        <h2 id="viewTitle">KSV LIVE MANAGER</h2>
        <div id="statusInfo" style="font-size: 0.7rem; color: var(--win);">● System bereit</div>
    </div>
    <button class="btn-action" style="width:auto; background:var(--red)" onclick="logout()">LOGOUT</button>
  </div>

  <div class="msg-center">
      <h3 style="margin:0 0 15px 0; font-size: 1rem; color: #60a5fa;">💬 POSTFACH</h3>
      <div class="msg-layout">
          <div class="msg-sidebar" id="chatSidebar"></div>
          <div class="msg-content">
              <div class="msg-list" id="msgList"></div>
              <div style="display:flex; gap:10px;">
                  <input type="text" id="msgInput" style="flex:1; margin:0;" placeholder="Nachricht...">
                  <button class="btn-action" style="width:auto;" onclick="sendMessage()">SENDEN</button>
              </div>
          </div>
      </div>
  </div>

  <div class="admin-panel" id="adminTools" style="display:none; border: 1px solid var(--blue); padding: 20px; border-radius: 20px; margin-bottom: 20px;">
    <h3 style="margin-top:0; color:#60a5fa; font-size: 0.9rem;">ADMIN STEUERUNG</h3>
    <div style="display:flex; gap:10px; flex-wrap: wrap;">
        <select id="companionSelect" style="flex:1; margin:0;"></select>
        <button class="btn-action" style="width:auto;" onclick="copyLink()">LINK KOPIEREN</button>
        <button class="btn-action" style="width:auto; background:var(--red);" onclick="clearCloud()">RESET SYSTEM</button>
    </div>
  </div>

  <div class="ticker-card" style="background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid var(--border);">
    <div id="liveTicker" class="ticker-val">00t 00h 00m 00s</div>
    <div style="color:var(--text-dim); font-size: 0.7rem; text-transform: uppercase; text-align:center;">Seit dem letzten Stadionbesuch</div>
  </div>

  <div class="stats-bar">
    <div class="stat-mini"><span>Besuche</span><b id="statCount">-</b></div>
    <div class="stat-mini"><span>Status</span><b id="statStatus">Aktiv</b></div>
    <div class="stat-mini"><span>Zukünftig</span><b id="statTotal">-</b></div>
    <div class="stat-mini"><span>Zuletzt vor</span><b id="statDays">-</b></div>
  </div>

  <div class="table-container">
    <h3 style="margin-top:0;">📅 SPIELPLAN</h3>
    <table class="match-table" id="matchTable">
      <thead><tr><th>Datum</th><th>Ort</th><th>Gegner</th><th>Score</th><th>Aktion</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
  
  <div id="adminSections" style="display:none; margin-top:20px; display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
    <div class="table-container"><h3>👤 RANKING</h3><table id="companionTable" style="width:100%; font-size: 0.8rem;"><thead><tr><th>NAME</th><th>SPIELE</th></tr></thead><tbody></tbody></table></div>
    <div class="table-container"><h3>🔑 USER-STATUS</h3><table id="userTable" style="width:100%; font-size: 0.8rem;"><thead><tr><th>BEGLEITER</th><th>STATUS</th></tr></thead><tbody></tbody></table></div>
  </div>
</div>

<script>
const FALLBACK_ADMIN_HASH = "80f84501a359739070381373516422d369f688034d6f6e52003c200676450f3b"; 
const NPOINT_ID = "15abfbbebe2742f743b2"; 
const DB_URL = `https://api.npoint.io/${NPOINT_ID}`;

let data = [], CloudDB = { zusagen: [], msgs: [], users: {}, adminHash: null, userIds: {} }, 
    filters = {companion: null}, isAdminMode = false, activeChat = "Alle";

window.onload = async () => {
    await refreshData();
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    if(id && CloudDB.userIds[id]) {
        filters.companion = CloudDB.userIds[id];
        activeChat = "Admin";
        document.getElementById("loginTitle").innerText = "Moin, " + filters.companion;
        document.getElementById("loginDesc").innerText = CloudDB.users[filters.companion] ? "Bitte Passwort eingeben." : "Willkommen! Lege dein Passwort fest:";
    } else {
        document.getElementById("loginTitle").innerText = "KSV Admin";
        document.getElementById("loginDesc").innerText = CloudDB.adminHash ? "Bitte Master-Passwort eingeben." : "Ersteinrichtung: Master-Passwort festlegen:";
    }
};

async function hash(str) {
    const msgBuffer = new TextEncoder().encode(str);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function handleAuth() {
    const pw = document.getElementById("passInput").value;
    if(!pw) return alert("Eingabe fehlt!");
    const pwHash = await hash(pw);
    const targetAdminHash = CloudDB.adminHash || FALLBACK_ADMIN_HASH;

    if(pwHash === targetAdminHash) { 
        if(!CloudDB.adminHash) { CloudDB.adminHash = pwHash; await saveToCloud(); }
        showApp(true); 
        return; 
    }

    if(filters.companion) {
        if(!CloudDB.users[filters.companion] || CloudDB.users[filters.companion] === pwHash) {
            if(!CloudDB.users[filters.companion]) { CloudDB.users[filters.companion] = pwHash; await saveToCloud(); }
            showApp(false);
        } else { alert("Passwort falsch!"); }
    } else { alert("Kein gültiger Admin oder Begleiter-Link!"); }
}

async function showApp(isAdmin) {
    isAdminMode = isAdmin;
    document.getElementById("loginOverlay").style.display = "none";
    document.getElementById("mainApp").style.display = "block";
    if(isAdmin) {
        document.getElementById("adminTools").style.display = "block";
        document.getElementById("adminSections").style.display = "grid";
    } else {
        document.getElementById("viewTitle").innerText = "Moin, " + filters.companion;
    }
    render();
    renderMessages();
}

async function refreshData() {
    try {
        const [resExcel, resCloud] = await Promise.all([fetch('daten.json?v=' + Date.now()), fetch(DB_URL)]);
        const excelJson = await resExcel.json();
        CloudDB = await resCloud.json();
        if(!CloudDB.msgs) CloudDB.msgs = [];
        if(!CloudDB.userIds) CloudDB.userIds = {};
        if(!CloudDB.users) CloudDB.users = {};

        data = excelJson.map(r => ({
            fD: parseFixDate(r["Datum"] || r["datum"], r["Uhrzeit"] || r["uhrzeit"]),
            datum: r["Datum"] || r["datum"], gegner: r["Gegner"], meinVerein: r["Mein Verein"],
            ort: (r["Ort"] || "H").toUpperCase(), tK: r["Tore Kiel"] || "", tG: r["Tore Gegner"] || "",
            played: r["Status"] === "Abgeschlossen", begleiter: (r["Begleiter"] || "").trim()
        }));
    } catch(e) { console.error(e); }
}

function parseFixDate(d, t) {
    let clean = d.includes(',') ? d.split(',')[1].trim() : d.trim();
    const p = clean.split('/');
    let dO = new Date(p[2], p[1]-1, p[0]);
    if(t) { const tp = t.replace(' Uhr','').split(':'); dO.setHours(tp[0], tp[1], 0); }
    return dO;
}

// MESSENGER FUNKTIONEN
function renderMessages() {
    const sidebar = document.getElementById("chatSidebar");
    const list = document.getElementById("msgList");
    sidebar.innerHTML = "";

    const companionsInExcel = [...new Set(data.filter(m => m.begleiter && m.played).flatMap(m => m.begleiter.split(/,| und /).map(n => n.trim())))].filter(n => n && n !== "nicht im stadion").sort();

    if (isAdminMode) {
        const chats = ["Alle", ...companionsInExcel];
        chats.forEach(u => {
            const hasUnread = CloudDB.msgs.some(m => m.from.startsWith(u) && !m.read);
            const div = document.createElement("div");
            div.className = `chat-tab ${activeChat === u ? 'active' : ''}`;
            div.innerHTML = `<span>${u}</span> ${hasUnread ? '<div class="unread-dot"></div>' : ''}`;
            div.onclick = () => { activeChat = u; markAsRead(u); renderMessages(); };
            sidebar.appendChild(div);
        });
    } else {
        sidebar.innerHTML = `<div class="chat-tab active">Admin</div>`;
    }

    let filtered = CloudDB.msgs.filter(m => {
        if(isAdminMode) {
            return (m.from.includes(activeChat) || m.to === activeChat);
        } else {
            return (m.from.includes(filters.companion) || m.to === filters.companion || m.to === "Alle");
        }
    });

    list.innerHTML = filtered.length ? filtered.map(m => {
        const isMe = isAdminMode ? m.from.startsWith("Admin") : m.from.startsWith(filters.companion);
        return `<div class="msg-bubble ${isMe ? 'me' : 'them'}">
            <div style="font-weight:bold; font-size:0.65rem; margin-bottom:2px; opacity:0.8;">${m.from}</div>
            ${m.txt}
            <span class="msg-meta">${m.time}</span>
        </div>`;
    }).join("") : `<p style="color:var(--text-dim); text-align:center; font-size:0.8rem;">Keine Nachrichten vorhanden.</p>`;
    list.scrollTop = list.scrollHeight;
}

async function sendMessage() {
    const input = document.getElementById("msgInput");
    if(!input.value) return;
    const now = new Date();
    const timeStr = now.toLocaleDateString('de-DE') + " " + now.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
    
    let senderLabel = isAdminMode ? `Admin < ${activeChat}` : `${filters.companion} < Admin`;

    CloudDB.msgs.push({ 
        from: senderLabel, to: isAdminMode ? activeChat : "Admin", 
        txt: input.value, time: timeStr, read: false 
    });

    await saveToCloud();
    input.value = "";
    renderMessages();
}

async function markAsRead(user) {
    let changed = false;
    CloudDB.msgs.forEach(m => { if(m.from.startsWith(user) && !m.read) { m.read = true; changed = true; } });
    if(changed) await saveToCloud();
}

// RENDERING
function render() {
    const now = new Date();
    data.sort((a,b) => b.fD - a.fD);
    const playedPast = data.filter(d => d.played);
    const history = playedPast.filter(m => m.begleiter.includes(filters.companion || "---"));
    
    if(history.length > 0) {
        const last = history[0].fD;
        const tick = () => {
            const diff = Math.max(0, new Date() - last);
            const d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
            document.getElementById("liveTicker").innerText = `${d}t ${h}h ${m}m ${s}s`;
        };
        tick(); setInterval(tick, 1000);
        document.getElementById("statDays").innerText = Math.floor((now-last)/86400000) + " T.";
    }

    const comps = {};
    data.forEach(m => { if(m.begleiter && m.played) m.begleiter.split(/,| und /).forEach(n => {
        const name = n.trim(); if(!name || name === "nicht im stadion") return;
        if(!comps[name]) comps[name] = 0; comps[name]++;
    })});

    if(isAdminMode) {
        const sel = document.getElementById("companionSelect");
        const sn = Object.keys(comps).sort();
        sel.innerHTML = sn.map(n => `<option value="${n}">${n}</option>`).join("");
        document.getElementById("companionTable").querySelector("tbody").innerHTML = Object.entries(comps).sort((a,b)=>b[1]-a[1]).map(([n,s])=>`<tr><td>${n}</td><td>${s}x</td></tr>`).join("");
        document.getElementById("userTable").querySelector("tbody").innerHTML = sn.map(u => `<tr><td>${u}</td><td>${CloudDB.users[u]?'✅ Aktiv':'⏳ Wartend'}</td></tr>`).join("");
    }

    const tbody = document.getElementById("matchTable").querySelector("tbody");
    tbody.innerHTML = data.map(m => {
        const isFuture = !m.played && m.fD > now;
        if(filters.companion && !isFuture && !m.begleiter.includes(filters.companion)) return "";
        const score = m.played ? `${m.tK}:${m.tG}` : "-:-";
        let action = isFuture ? '<span class="tag-request">ZUKUNFT</span>' : '';
        if(isAdminMode && m.begleiter) action = m.begleiter.split(',').map(n => `<span class="tag-confirmed">${n.trim()}</span>`).join(' ');
        return `<tr><td>${m.datum}</td><td>${m.ort}</td><td>${m.gegner}</td><td>${score}</td><td>${action}</td></tr>`;
    }).join("");
    
    document.getElementById("statCount").innerText = filters.companion ? history.length : playedPast.length;
    document.getElementById("statTotal").innerText = data.filter(m => !m.played && m.fD > now).length;
}

async function saveToCloud() { await fetch(DB_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(CloudDB) }); }
function logout() { window.location.href = window.location.pathname; }
async function copyLink() {
    const name = document.getElementById("companionSelect").value;
    let id = Object.keys(CloudDB.userIds).find(key => CloudDB.userIds[key] === name) || Math.random().toString(36).substr(2, 6);
    CloudDB.userIds[id] = name; await saveToCloud();
    navigator.clipboard.writeText(window.location.origin + window.location.pathname + "?id=" + id);
    alert("Link für " + name + " kopiert!");
}
async function clearCloud() { if(confirm("ALLES LÖSCHEN?")) { CloudDB={zusagen:[],msgs:[],users:{},adminHash:null,userIds:{}}; await saveToCloud(); location.reload(); } }
</script>
</body>
</html>
