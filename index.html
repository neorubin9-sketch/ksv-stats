<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>KSV – Cloud Sync Master</title>
<style>
  :root{ 
    --blue:#003f8c; --red:#e30613; --bg:#0f172a; --card:#1e293b; 
    --border:#334155; --text:#f8fafc; --text-dim:#94a3b8;
    --win:#22c55e;
  }
  
  *{box-sizing:border-box; font-family: 'Inter', sans-serif;}
  body{ margin:0; padding:20px; background: var(--bg); color:var(--text); line-height: 1.6; }
  .container { max-width: 1650px; margin: 0 auto; }
  
  .header{ display:flex; align-items:center; justify-content:space-between; margin-bottom:25px; background: linear-gradient(135deg, var(--blue), #001f44); padding: 30px; border-radius: 20px; border: 1px solid var(--border); }
  .btn-refresh { background: #fff; color: var(--blue); border: none; border-radius: 10px; padding: 12px 25px; cursor: pointer; font-weight: 800; }

  /* QR Section */
  .qr-section { background: rgba(255,255,255,0.03); padding: 25px; border-radius: 25px; border: 1px dashed var(--border); margin-bottom: 30px; }
  .qr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; margin-top: 15px; }
  .qr-card { background: white; padding: 10px; border-radius: 10px; text-align: center; color: #000; }
  .qr-card span { display: block; font-size: 10px; font-weight: 800; margin-top: 5px; color: var(--blue); }

  .badge-row { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; background: rgba(0,0,0,0.3); padding: 25px; border-radius: 25px; margin-bottom: 30px; border: 1px solid var(--border); }
  .badge-img { width: 80px; height: 80px; object-fit: contain; filter: grayscale(1) brightness(0.2); opacity: 0.3; transition: 0.5s; }
  .active-badge { filter: grayscale(0) brightness(1) !important; opacity: 1 !important; transform: scale(1.1); filter: drop-shadow(0 0 15px rgba(96, 165, 250, 0.5)); }

  .ticker-card { background: var(--card); border: 2px solid #60a5fa; border-radius: 25px; padding: 30px; margin-bottom: 30px; text-align: center; }
  .ticker-val { font-size: 2.8rem; font-weight: 900; color: #fff; font-variant-numeric: tabular-nums; }
  
  .main-grid { display: grid; grid-template-columns: 1fr; gap: 30px; }
  @media (min-width: 1200px) { .main-grid { grid-template-columns: 1.8fr 1.2fr; } }
  .table-container { background: var(--card); border-radius: 25px; padding: 25px; border: 1px solid var(--border); }

  .match-table { width:100%; border-collapse:collapse; table-layout: fixed; }
  .match-table th { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; padding: 15px; border-bottom: 2px solid var(--border); }
  .match-table td { padding: 15px 5px; border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: middle; text-align: center; }
  
  .team-cell { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 0.9rem; }
  .h-align { justify-content: flex-end; }
  .a-align { justify-content: flex-start; }
  .logo-img { width: 35px; height: 35px; object-fit: contain; }
  .score-box { background: #0f172a; padding: 6px 0; border-radius: 8px; width: 80px; display: inline-block; font-weight: 800; border: 1px solid var(--border); }
  .ort-tag { padding: 3px 8px; border-radius: 5px; font-size: 10px; font-weight: 900; background: #334155; color: #94a3b8; }
  .st-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
  .st-on { background: var(--win); box-shadow: 0 0 12px var(--win); }
  .st-off { background: #475569; opacity: 0.3; }

  .comp-row { cursor: pointer; }
  .comp-row:hover { background: rgba(255,255,255,0.05); }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div>
        <h1 style="margin:0;">KSV <span style="color:var(--red)">CLOUD LOG</span></h1>
        <div id="statusInfo" style="color:var(--text-dim); font-size: 0.9rem;">Lade Daten von GitHub...</div>
    </div>
    <button class="btn-refresh" onclick="location.href=window.location.pathname">🔄 RESET / NEU LADEN</button>
  </div>

  <div class="qr-section" id="qrContainer" style="display:none;">
    <div style="font-size: 0.8rem; color: #60a5fa; font-weight: 800; letter-spacing: 1px;">QR-CODES FÜR BEGLEITER</div>
    <div class="qr-grid" id="qrGrid"></div>
  </div>

  <div class="badge-row" id="badgeRow">
    <img src="10.png" id="m-10" class="badge-img"><img src="25.png" id="m-25" class="badge-img">
    <img src="50.png" id="m-50" class="badge-img"><img src="100.png" id="m-100" class="badge-img">
    <img src="250.png" id="m-250" class="badge-img"><img src="500.png" id="m-500" class="badge-img">
  </div>

  <div class="ticker-card">
    <div id="liveTicker" class="ticker-val">00t 00h 00m 00s</div>
    <div id="tickerTitle" style="color:var(--text-dim); font-size: 0.8rem; margin-top: 10px;">ABWESENHEITS-ABGRUND</div>
  </div>

  <div class="main-grid">
    <div class="table-container">
      <h2>📅 SPIELPLAN</h2>
      <table class="match-table" id="matchTable">
        <thead><tr><th style="width:100px">Datum</th><th style="width:60px">Ort</th><th style="text-align:right">Heim</th><th style="width:90px">Score</th><th style="text-align:left">Gast</th><th style="width:60px">Dabei</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
    <div class="table-container">
        <h2>👤 BEGLEITER</h2>
        <table id="companionTable" style="width:100%; border-collapse:collapse;">
          <thead><tr style="color:var(--text-dim); font-size: 10px;"><th>NAME</th><th>BESUCHE</th><th>MAX LÜCKE</th></tr></thead>
          <tbody></tbody>
        </table>
    </div>
  </div>
</div>

<script>
let data = [], filters = {companion: null}, tickerInterval = null;

window.onload = async () => {
    const params = new URLSearchParams(window.location.search);
    const companionParam = params.get('name');
    if(companionParam) filters.companion = decodeURIComponent(companionParam);

    try {
        const response = await fetch('daten.json?v=' + Date.now());
        if (!response.ok) throw new Error("daten.json nicht gefunden");
        const rawData = await response.json();
        
        data = rawData.map(r => ({
            fullDate: parseD(r["Datum"] || r["datum"], r["Uhrzeit"] || r["uhrzeit"]),
            datum: r["Datum"] || r["datum"],
            gegner: (r["Gegner"] || r["gegner"] || "Unbekannt").trim(),
            meinVerein: (r["Mein Verein"] || r["mein verein"] || "Holstein Kiel").trim(),
            ort: (r["Ort"] || r["ort"] || "H").toUpperCase(),
            tK: r["Tore Kiel"] || r["tore kiel"] || 0,
            tG: r["Tore Gegner"] || r["tore gegner"] || 0,
            played: r["Tore Kiel"] !== undefined && r["Tore Kiel"] !== "",
            begleiter: r["Begleiter"] || r["begleiter"] || ""
        }));

        document.getElementById("statusInfo").innerText = filters.companion ? 
            "Profil: " + filters.companion : "Cloud-Daten geladen";
        render();
    } catch (err) {
        document.getElementById("statusInfo").innerHTML = "<b style='color:var(--red)'>Fehler beim Laden der daten.json</b>";
    }
};

function parseD(d, t) {
    let date = new Date();
    if (typeof d === "string") { const p = d.split('.'); date = new Date(p[2], p[1]-1, p[0]); }
    if (t) {
        let h=15, m=30;
        if (typeof t === "string" && t.includes(':')) { const tp = t.split(':'); h=parseInt(tp[0]); m=parseInt(tp[1]); }
        date.setHours(h, m, 0, 0);
    }
    return date;
}

function render() {
    const played = data.filter(d => d.played).sort((a,b) => a.fullDate - b.fullDate);
    const relevant = filters.companion ? 
        played.filter(m => m.begleiter.includes(filters.companion)) : 
        played.filter(m => isStadium(m.begleiter));

    if (relevant.length < 1) return;

    // Ticker
    const lastVisit = relevant[relevant.length-1].fullDate;
    if(tickerInterval) clearInterval(tickerInterval);
    tickerInterval = setInterval(() => {
        const diff = new Date() - lastVisit;
        const d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
        document.getElementById("liveTicker").innerText = `${d}t ${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
    }, 1000);

    // Badges
    [10, 25, 50, 100, 250, 500].forEach(n => {
        document.getElementById(`m-${n}`).className = relevant.length >= n ? "badge-img active-badge" : "badge-img";
    });

    // Tabelle Spielplan
    const tbody = document.getElementById("matchTable").querySelector("tbody");
    tbody.innerHTML = data.sort((a,b) => b.fullDate - a.fullDate).map(m => {
        const isDabei = isStadium(m.begleiter) && (!filters.companion || m.begleiter.includes(filters.companion));
        const opacity = filters.companion && !m.begleiter.includes(filters.companion) ? '0.2' : '1';
        const isH = m.ort === "H";
        
        const hName = isH ? m.meinVerein : m.gegner;
        const aName = isH ? m.gegner : m.meinVerein;

        return `<tr style="opacity: ${opacity}">
            <td>${m.datum}</td><td><span class="ort-tag">${m.ort}</span></td>
            <td><div class="team-cell h-align"><span>${hName}</span><img src="${hName}.png" class="logo-img" onerror="this.style.visibility='hidden'"></div></td>
            <td><div class="score-box">${m.played ? (isH ? m.tK+':'+m.tG : m.tG+':'+m.tK) : '-:-'}</div></td>
            <td><div class="team-cell a-align"><img src="${aName}.png" class="logo-img" onerror="this.style.visibility='hidden'"><span>${aName}</span></div></td>
            <td><span class="st-dot ${isDabei ? 'st-on' : 'st-off'}"></span></td>
        </tr>`;
    }).join("");

    // Begleiter Stats & QR Generator
    const comps = {};
    played.forEach(m => {
        if(!m.begleiter) return;
        m.begleiter.split(/,| und /).forEach(n => {
            const name = n.trim(); if(!name) return;
            if(!comps[name]) comps[name] = {sp: 0, last: null, maxG: 0};
            if(comps[name].last) {
                const g = Math.floor((m.fullDate - comps[name].last)/86400000);
                if(g > comps[name].maxG) comps[name].maxG = g;
            }
            comps[name].sp++; comps[name].last = m.fullDate;
        });
    });

    // Begleiter Tabelle befüllen
    document.getElementById("companionTable").querySelector("tbody").innerHTML = Object.entries(comps).sort((a,b)=>b[1].sp - a[1].sp).map(([n, s]) => `
        <tr class="comp-row" onclick="window.location.href='?name=${encodeURIComponent(n)}'">
            <td style="padding:12px; font-weight:bold; text-align:left;">${n}</td>
            <td style="text-align:center">${s.sp}x</td>
            <td style="text-align:center; color:var(--red)">${s.maxG} T.</td>
        </tr>`).join("");

    // QR Codes (Nur in Gesamtansicht)
    if(!filters.companion) {
        document.getElementById("qrContainer").style.display = "block";
        const baseUrl = window.location.href.split('?')[0];
        document.getElementById("qrGrid").innerHTML = Object.keys(comps).map(name => {
            const qrUrl = `https://chart.googleapis.com/chart?chs=150x150&cht=qr&chl=${encodeURIComponent(baseUrl + '?name=' + name)}&choe=UTF-8`;
            return `<div class="qr-card"><img src="${qrUrl}"><span>${name}</span></div>`;
        }).join("");
    }
}

function isStadium(v) { return v && v.trim() !== "" && v.toLowerCase() !== "nicht im stadion" && v.toLowerCase() !== "keine zuschauer"; }
</script>
</body>
</html>
