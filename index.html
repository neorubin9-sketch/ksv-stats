<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>KSV – Precision Abyss Master</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{ 
    --blue:#003f8c; --red:#e30613; --bg:#0f172a; --card:#1e293b; 
    --border:#334155; --text:#f8fafc; --text-dim:#94a3b8;
    --win:#22c55e;
  }
  
  *{box-sizing:border-box; font-family: 'Inter', sans-serif;}
  body{ margin:0; padding:20px; background: var(--bg); color:var(--text); line-height: 1.6; }
  .container { max-width: 1650px; margin: 0 auto; }
  
  .header{ display:flex; align-items:center; justify-content:space-between; margin-bottom:25px; background: linear-gradient(135deg, var(--blue), #001f44); padding: 30px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
  .fileLabel { background: #fff; color: var(--blue); padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: 800; transition: 0.3s; }
  .btn-reset { background: var(--red); color: white; border: none; border-radius: 10px; padding: 12px 25px; cursor: pointer; font-weight: 800; }

  .badge-row { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; background: rgba(0,0,0,0.3); padding: 25px; border-radius: 25px; margin-bottom: 30px; border: 1px solid var(--border); }
  .badge-img { width: 80px; height: 80px; object-fit: contain; filter: grayscale(1) brightness(0.2); opacity: 0.3; transition: 0.5s; }
  .active-badge { filter: grayscale(0) brightness(1) !important; opacity: 1 !important; transform: scale(1.1); filter: drop-shadow(0 0 15px rgba(96, 165, 250, 0.5)); }

  .ticker-card { background: var(--card); border: 2px solid #60a5fa; border-radius: 25px; padding: 30px; margin-bottom: 30px; text-align: center; }
  .ticker-val { font-size: 3rem; font-weight: 900; color: #fff; font-variant-numeric: tabular-nums; letter-spacing: 2px; }
  .ticker-sub { color: var(--text-dim); font-size: 0.8rem; margin-top: 5px; text-transform: uppercase; letter-spacing: 3px; }

  .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 30px; }
  .stat-mini { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
  .stat-mini span { display: block; font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; }
  .stat-mini b { font-size: 1.2rem; color: #fff; }

  .main-grid { display: grid; grid-template-columns: 1fr; gap: 30px; }
  @media (min-width: 1300px) { .main-grid { grid-template-columns: 1.8fr 1.2fr; } }
  
  .table-container { background: var(--card); border-radius: 25px; padding: 30px; border: 1px solid var(--border); }
  h2 { margin: 0 0 20px 0; font-size: 1.2rem; font-weight: 800; border-left: 4px solid var(--blue); padding-left: 15px; }

  .match-table { width:100%; border-collapse:collapse; table-layout: fixed; }
  .match-table th { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; padding: 15px; border-bottom: 2px solid var(--border); }
  .match-table td { padding: 18px 5px; border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: middle; }

  .col-date { width: 100px; text-align: center; }
  .col-ort { width: 60px; text-align: center; }
  .col-score { width: 110px; text-align: center; }
  .col-status { width: 60px; text-align: center; }
  .col-team { width: auto; }

  .team-cell { display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 0.95rem; }
  .h-align { justify-content: flex-end; text-align: right; }
  .a-align { justify-content: flex-start; text-align: left; }
  
  .score-box { background: #0f172a; padding: 8px 0; border-radius: 10px; font-family: 'Monaco', monospace; font-size: 1.3rem; width: 90px; display: inline-block; border: 1px solid var(--border); color: #fff; text-align: center; }
  .logo-img { width: 42px; height: 42px; object-fit: contain; flex-shrink: 0; }
  .ort-tag { padding: 3px 8px; border-radius: 5px; font-size: 10px; font-weight: 900; background: #334155; color: #94a3b8; }

  .st-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
  .st-on { background: var(--win); box-shadow: 0 0 12px var(--win); }
  .st-off { background: #475569; opacity: 0.3; }

  .comp-row { cursor: pointer; transition: 0.2s; }
  .comp-row.active { background: rgba(96, 165, 250, 0.15); border-left: 5px solid #60a5fa; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div>
        <h1 style="margin:0; font-size: 1.8rem;">KSV <span style="color:var(--red)">PRECISION LOG</span></h1>
        <div id="infoBox" style="color:var(--text-dim); font-size: 0.9rem;">Präsenz & Echtzeit-Abgrund inkl. Uhrzeit</div>
    </div>
    <div>
        <label for="excelInput" class="fileLabel">📥 EXCEL IMPORT</label>
        <input type="file" id="excelInput" accept=".xlsx,.xls" style="display:none" />
        <button class="btn-reset" onclick="resetView()">RESET</button>
    </div>
  </div>

  <div class="badge-row">
    <img src="10.png" id="m-10" class="badge-img"><img src="25.png" id="m-25" class="badge-img">
    <img src="50.png" id="m-50" class="badge-img"><img src="100.png" id="m-100" class="badge-img">
    <img src="250.png" id="m-250" class="badge-img"><img src="500.png" id="m-500" class="badge-img">
  </div>

  <div class="ticker-card">
    <div class="ticker-sub" id="tickerTitle">Laufender Abwesenheits-Abgrund</div>
    <div id="liveTicker" class="ticker-val">00t 00h 00m 00s</div>
    <div id="lastVisitInfo" style="font-size: 0.8rem; color: var(--text-dim); margin-top:10px;">-</div>
  </div>

  <div class="stats-bar">
    <div class="stat-mini"><span>Ø Frequenz</span><b id="statFreq">-</b></div>
    <div class="stat-mini"><span>Ø Real-Pause</span><b id="statGap">-</b></div>
    <div class="stat-mini"><span>Max. Lücke</span><b id="statMax" style="color:var(--red)">-</b></div>
    <div class="stat-mini"><span>Zeit-Radius</span><b id="statRadius">-</b></div>
  </div>

  <div class="main-grid">
    <div class="table-container">
      <h2>📅 SPIELPLAN</h2>
      <table class="match-table" id="matchTable">
        <thead>
          <tr>
            <th class="col-date">Datum / Zeit</th>
            <th class="col-ort">Ort</th>
            <th class="col-team">Heim</th>
            <th class="col-score">Ergebnis</th>
            <th class="col-team">Gast</th>
            <th class="col-status">Status</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="table-container">
      <h2>👤 BEGLEITER</h2>
      <table id="companionTable" style="width:100%; border-collapse:collapse;">
        <thead>
          <tr><th style="text-align:left; padding:15px; color:var(--text-dim); font-size:0.7rem; text-transform:uppercase;">Name</th><th style="color:var(--text-dim); font-size:0.7rem; text-transform:uppercase;">Besuche</th><th style="color:var(--text-dim); font-size:0.7rem; text-transform:uppercase;">Max. Pause</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<script>
let data = [], filters = {companion: null}, tickerInterval = null;

/** DATUMS- & ZEIT-LOGIK **/
function parseFullDate(dateVal, timeVal) {
    let d = new Date();
    if (typeof dateVal === "number") {
        d = new Date(Math.round((dateVal - 25569) * 86400 * 1000));
    } else if (typeof dateVal === "string") {
        const p = dateVal.split('.');
        if (p.length === 3) d = new Date(p[2], p[1] - 1, p[0]);
    }

    if (timeVal) {
        let hours = 0, mins = 0;
        if (typeof timeVal === "number") {
            const totalMins = Math.round(timeVal * 1440);
            hours = Math.floor(totalMins / 60);
            mins = totalMins % 60;
        } else if (typeof timeVal === "string" && timeVal.includes(':')) {
            const t = timeVal.split(':');
            hours = parseInt(t[0]);
            mins = parseInt(t[1]);
        }
        d.setHours(hours, mins, 0, 0);
    } else {
        d.setHours(15, 30, 0, 0); // Default Anpfiff
    }
    return d;
}

function formatD(d) {
    const date = new Date(d);
    return `${String(date.getDate()).padStart(2,'0')}.${String(date.getMonth()+1).padStart(2,'0')}.${date.getFullYear()}`;
}

function formatT(d) {
    const date = new Date(d);
    return `${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')} Uhr`;
}

function isStadion(v) {
    const b = (v || "").toString().toLowerCase().trim();
    return b !== "" && b !== "nicht im stadion" && b !== "keine zuschauer";
}

function render() {
    const played = data.filter(d => d.played).sort((a,b) => a.fullDate - b.fullDate);
    let relevant = filters.companion ? played.filter(m => isStadion(m.begleiter) && m.begleiter.toString().includes(filters.companion)) : played.filter(m => isStadion(m.begleiter));

    if (relevant.length < 1) return;

    const firstVisit = relevant[0].fullDate;
    const lastVisit = relevant[relevant.length-1].fullDate;
    const now = new Date();
    
    let gaps = [];
    for(let i=1; i < relevant.length; i++) {
        gaps.push(Math.floor((relevant[i].fullDate - relevant[i-1].fullDate) / 86400000));
    }
    const currentGap = Math.floor((now - lastVisit) / 86400000);
    gaps.push(currentGap);

    document.getElementById("statFreq").innerText = `Alle ${(Math.floor((now - firstVisit)/86400000) / relevant.length).toFixed(1)} T.`;
    document.getElementById("statGap").innerText = `${(gaps.reduce((a,b)=>a+b,0)/gaps.length).toFixed(1)} T.`;
    document.getElementById("statMax").innerText = `${Math.max(...gaps)} T.`;
    document.getElementById("statRadius").innerText = `${Math.floor((now - firstVisit)/86400000)} T.`;
    document.getElementById("lastVisitInfo").innerText = `Letzter Anpfiff: ${formatD(lastVisit)} um ${formatT(lastVisit)}`;
    
    if(tickerInterval) clearInterval(tickerInterval);
    tickerInterval = setInterval(() => {
        const diff = new Date() - lastVisit;
        const d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
        document.getElementById("liveTicker").innerText = `${d}t ${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
    }, 1000);

    [10, 25, 50, 100, 250, 500].forEach(n => {
        document.getElementById(`m-${n}`).className = relevant.length >= n ? "badge-img active-badge" : "badge-img";
    });

    const tbody = document.getElementById("matchTable").querySelector("tbody");
    tbody.innerHTML = data.sort((a,b) => b.fullDate - a.fullDate).map(m => {
        const focus = filters.companion ? (m.begleiter||"").includes(filters.companion) : true;
        const present = isStadion(m.begleiter) && focus;
        const isH = (m.ort || "H").toUpperCase() === "H";
        const meinVerein = (m.meinVerein || "Holstein Kiel").trim();
        
        let hN = isH ? meinVerein : m.gegner, hL = `${hN}.png`;
        let aN = isH ? m.gegner : meinVerein, aL = `${aN}.png`;
        let sc = isH ? `${m.tK}:${m.tG}` : `${m.tG}:${m.tK}`;

        return `<tr style="${filters.companion && !focus ? 'opacity:0.15' : ''}">
            <td class="col-date">
                <div style="font-size:11px; font-weight:bold;">${formatD(m.fullDate)}</div>
                <div style="font-size:10px; color:var(--text-dim);">${formatT(m.fullDate)}</div>
            </td>
            <td class="col-ort"><span class="ort-tag">${isH ? 'H' : 'A'}</span></td>
            <td class="col-team">
                <div class="team-cell h-align">
                    <span>${hN}</span>
                    <img src="${hL}" class="logo-img" onerror="this.style.visibility='hidden'">
                </div>
            </td>
            <td class="col-score"><div class="score-box">${m.played ? sc : '-:-'}</div></td>
            <td class="col-team">
                <div class="team-cell a-align">
                    <img src="${aL}" class="logo-img" onerror="this.style.visibility='hidden'">
                    <span>${aN}</span>
                </div>
            </td>
            <td class="col-status"><span class="st-dot ${present ? 'st-on' : 'st-off'}"></span></td>
        </tr>`;
    }).join("");

    const comps = {};
    played.forEach(m => {
        if(!isStadion(m.begleiter)) return;
        m.begleiter.split(/,| und /).forEach(n => {
            const name = n.trim(); if(!name) return;
            if(!comps[name]) comps[name] = {sp: 0, last: null, maxG: 0};
            if(comps[name].last) {
                const g = Math.floor((m.fullDate - comps[name].last)/86400000);
                if(g > comps[name].maxG) comps[name].maxG = g;
            }
            comps[name].sp++; comps[name].last = m.fullDate;
        });
    });
    document.getElementById("companionTable").querySelector("tbody").innerHTML = Object.entries(comps).sort((a,b)=>b[1].sp - a[1].sp).map(([n, s]) => {
        const gapNow = Math.floor((new Date() - s.last)/86400000);
        return `<tr class="comp-row ${filters.companion === n ? 'active' : ''}" onclick="setComp('${n}')">
            <td style="padding:15px;"><b>${n}</b></td>
            <td style="text-align:center">${s.sp}x</td>
            <td style="text-align:center; color:var(--red)">${Math.max(s.maxG, gapNow)} T.</td>
        </tr>`;
    }).join("");
}

function setComp(n) { filters.companion = (filters.companion === n ? null : n); render(); }
function resetView() { filters.companion = null; render(); }

document.getElementById("excelInput").onchange = (e) => {
    const f = e.target.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = (evt) => {
        const wb = XLSX.read(new Uint8Array(evt.target.result), {type:'array'});
        data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {defval:""}).map(r => ({
            fullDate: parseFullDate(r["Datum"], r["Uhrzeit"]),
            gegner: (r["Gegner"] || "Unbekannt").trim(), 
            meinVerein: (r["Mein Verein"] || "Holstein Kiel").trim(),
            ort: r["Ort"] || "H", 
            tK: r["Tore Kiel"], 
            tG: r["Tore Gegner"],
            played: !isNaN(parseInt(r["Tore Kiel"])), 
            begleiter: r["Begleiter"] || ""
        }));
        render();
    };
    r.readAsArrayBuffer(f);
};
</script>
</body>
</html>
