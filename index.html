<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
<title>KSV – Live Manager Pro</title>
<style>
  :root{ 
    --blue:#003f8c; --red:#e30613; --bg:#0f172a; --card:#1e293b; 
    --border:#334155; --text:#f8fafc; --text-dim:#94a3b8;
    --win:#22c55e; --amber:#f59e0b;
  }
  *{box-sizing:border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent;}
  body{ margin:0; padding:10px; background: var(--bg); color:var(--text); line-height: 1.5; }
  .container { max-width: 1650px; margin: 0 auto; display: none; } 

  /* Messenger / Nachrichtenzentrale */
  .msg-center { 
    background: var(--card); border: 1px solid var(--blue); border-radius: 20px; 
    padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  .msg-list { max-height: 150px; overflow-y: auto; margin-bottom: 15px; display: flex; flex-direction: column; gap: 8px; }
  .msg-item { 
    padding: 10px 15px; border-radius: 10px; font-size: 0.85rem; 
    border-left: 4px solid var(--blue); background: rgba(255,255,255,0.03);
  }
  .msg-item.broadcast { border-left-color: var(--amber); background: rgba(245, 158, 11, 0.05); }
  .msg-item.admin-note { border-left-color: var(--win); }

  .msg-input-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
  .msg-input { 
    flex: 1; background: var(--bg); border: 1px solid var(--border); 
    color: white; padding: 10px; border-radius: 8px; min-width: 200px;
  }

  /* Standard Elemente */
  #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); display:flex; align-items:center; justify-content:center; z-index:9999; flex-direction: column; padding: 20px; }
  .login-box { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--border); text-align:center; width: 100%; max-width: 350px; }
  input[type="password"], select { background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 10px; width: 100%; margin-bottom: 20px; text-align: center; }
  .btn-action { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 800; width: 100%; transition: 0.2s; }
  .btn-action:hover { opacity: 0.8; transform: translateY(-2px); }
  
  .header{ display:flex; align-items:center; justify-content:space-between; margin-bottom: 20px; background: linear-gradient(135deg, var(--blue), #001f44); padding: 25px; border-radius: 20px; border: 1px solid var(--border); }
  .admin-panel { background: rgba(96, 165, 250, 0.05); padding: 20px; border-radius: 20px; border: 1px solid var(--blue); margin-bottom: 20px; }
  
  .ticker-card { background: var(--card); border: 2px solid #60a5fa; border-radius: 20px; padding: 20px; margin-bottom: 20px; text-align: center; }
  .ticker-val { font-size: 2.5rem; font-weight: 900; color: #fff; font-variant-numeric: tabular-nums; }
  
  .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat-mini { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
  .stat-mini b { font-size: 1rem; color: #fff; }

  .main-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
  @media (min-width: 1200px) { .main-grid { grid-template-columns: 1.8fr 1.2fr; } }
  
  .table-container { background: var(--card); border-radius: 20px; padding: 15px; border: 1px solid var(--border); overflow-x: auto; }
  .match-table { width:100%; border-collapse:collapse; min-width: 600px; }
  .match-table th { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; padding: 10px; border-bottom: 1px solid var(--border); }
  .match-table td { padding: 12px 5px; border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: middle; text-align: center; }
  
  .logo-img { width: 28px; height: 28px; object-fit: contain; vertical-align: middle; }
  .score-box { background: #0f172a; padding: 5px 0; border-radius: 8px; width: 60px; display: inline-block; font-weight: 800; border: 1px solid var(--border); }
  
  .name-tag { font-size: 0.65rem; font-weight: 700; padding: 2px 6px; border-radius: 4px; display: inline-flex; align-items: center; gap: 4px; margin: 2px; }
  .tag-confirmed { background: var(--win); color: #000; }
  .tag-request { background: var(--amber); color: #000; }
  
  .btn-mini { border:none; border-radius:4px; padding:1px 4px; cursor:pointer; font-size: 0.6rem; font-weight: 900; }
  .st-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; background: var(--win); margin-right: 5px; }
  .future-row { background: rgba(96, 165, 250, 0.02); }
</style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2>KSV Dashboard</h2>
        <input type="password" id="passInput" placeholder="Passwort...">
        <button class="btn-action" onclick="checkLogin()">LOGIN</button>
    </div>
</div>

<div class="container" id="mainApp">
  <div class="header">
    <div>
        <h2 id="viewTitle">KSV LIVE MANAGER</h2>
        <div id="statusInfo">Synchronisierung...</div>
    </div>
    <button class="btn-action" style="width:auto; background:var(--red)" onclick="logout()">LOGOUT</button>
  </div>

  <div class="msg-center" id="msgCenter">
      <h3 style="margin-top:0; font-size: 1rem; color: #60a5fa;">💬 NACHRICHTEN</h3>
      <div class="msg-list" id="msgList">
          <div class="msg-item">Keine neuen Nachrichten vorhanden.</div>
      </div>
      <div class="msg-input-group">
          <select id="msgTarget" style="margin:0; width: 120px; padding: 8px; display:none;"></select>
          <input type="text" id="msgInput" class="msg-input" placeholder="Nachricht schreiben...">
          <button class="btn-action" style="width:auto; padding: 10px 20px;" onclick="sendMessage()">SENDEN</button>
      </div>
  </div>

  <div class="admin-panel" id="adminTools">
    <div style="display:flex; gap:10px; flex-wrap: wrap;">
        <select id="companionSelect" style="margin:0; flex:1; min-width: 200px;"></select>
        <button class="btn-action" style="width:auto;" onclick="copyLink()">LINK KOPIEREN</button>
        <button class="btn-action" style="width:auto; background:var(--red);" onclick="clearCloud()">RESET SYSTEM</button>
    </div>
  </div>

  <div class="ticker-card">
    <div id="liveTicker" class="ticker-val">00t 00h 00m 00s</div>
    <div style="color:var(--text-dim); font-size: 0.7rem; text-transform: uppercase;">Abwesenheit vom Stadion</div>
  </div>

  <div class="stats-bar">
    <div class="stat-mini"><span>Besuche</span><b id="statCount">-</b></div>
    <div class="stat-mini"><span>Status</span><b id="statStatus">Aktiv</b></div>
    <div class="stat-mini"><span>Offen</span><b id="statTotal">-</b></div>
    <div class="stat-mini"><span>Zuletzt vor</span><b id="statDays">-</b></div>
  </div>

  <div class="main-grid">
    <div class="table-container">
      <h3>📅 SPIELPLAN</h3>
      <table class="match-table" id="matchTable">
        <thead><tr><th>Datum</th><th>Ort</th><th style="text-align:right">Heim</th><th>Score</th><th style="text-align:left">Gast</th><th>Status / Begleiter</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
    <div class="table-container" id="companionSection">
        <h3>👤 BEGLEITER-RANKING</h3>
        <table id="companionTable" style="width:100%; border-collapse:collapse;">
          <thead><tr style="color:var(--text-dim); font-size: 0.6rem;"><th>NAME</th><th>SPIELE</th><th>ZULETZT</th></tr></thead>
          <tbody></tbody>
        </table>
    </div>
  </div>
</div>

<script>
const ADMIN_PASSWORD = "KSV"; 
const NPOINT_ID = "15abfbbebe2742f743b2"; 
const DB_URL = `https://api.npoint.io/${NPOINT_ID}`;

let data = [], CloudDB = { zusagen: [], msgs: [] }, filters = {companion: null}, tickerInterval = null, isAdminMode = false;

window.onload = async () => {
    const params = new URLSearchParams(window.location.search);
    const user = params.get('user');
    if(user) { 
        filters.companion = decodeURIComponent(user); 
        document.getElementById("viewTitle").innerText = "Moin, " + filters.companion + "!";
        showApp(false); 
    }
};

function checkLogin() {
    if(document.getElementById("passInput").value === ADMIN_PASSWORD) {
        isAdminMode = true;
        document.getElementById("msgTarget").style.display = "block";
        showApp(true);
    } else alert("Passwort falsch!");
}

async function showApp(isAdmin) {
    document.getElementById("loginOverlay").style.display = "none";
    document.getElementById("mainApp").style.display = "block";
    if(!isAdmin) {
        document.getElementById("adminTools").style.display = "none";
        document.getElementById("companionSection").style.display = "none";
    }
    await refreshData();
}

async function refreshData() {
    try {
        const [resExcel, resCloud] = await Promise.all([
            fetch('daten.json?v=' + Date.now()),
            fetch(DB_URL)
        ]);
        const excelJson = await resExcel.json();
        CloudDB = await resCloud.json();
        if(!CloudDB.zusagen) CloudDB.zusagen = [];
        if(!CloudDB.msgs) CloudDB.msgs = [];
        
        data = excelJson.map(r => ({
            fD: parseFixDate(r["Datum"] || r["datum"], r["Uhrzeit"] || r["uhrzeit"]),
            datum: r["Datum"] || r["datum"], 
            gegner: r["Gegner"], 
            meinVerein: r["Mein Verein"],
            ort: (r["Ort"] || "H").toUpperCase(),
            tK: r["Tore Kiel"] || "", 
            tG: r["Tore Gegner"] || "",
            played: r["Status"] === "Abgeschlossen",
            begleiter: (r["Begleiter"] || "").trim()
        }));
        
        render();
        renderMessages();
    } catch (e) { console.error("Sync Error", e); }
}

function parseFixDate(dStr, tStr) {
    if (!dStr) return new Date();
    let clean = dStr.includes(',') ? dStr.split(',')[1].trim() : dStr.trim();
    const parts = clean.split('/');
    if (parts.length === 3) {
        let dO = new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
        if (tStr) {
            const tp = tStr.replace(' Uhr', '').split(':');
            if(tp.length >= 2) dO.setHours(tp[0], tp[1], 0);
        }
        return dO;
    }
    return new Date();
}

function renderMessages() {
    const list = document.getElementById("msgList");
    let visibleMsgs = [];

    if(isAdminMode) {
        visibleMsgs = CloudDB.msgs; // Admin sieht alles
    } else {
        // Begleiter sieht Broadcasts ODER Nachrichten an sich selbst
        visibleMsgs = CloudDB.msgs.filter(m => m.to === "Alle" || m.to === filters.companion || m.from === filters.companion);
    }

    if(visibleMsgs.length === 0) {
        list.innerHTML = '<div class="msg-item">Keine Nachrichten vorhanden.</div>';
        return;
    }

    list.innerHTML = visibleMsgs.reverse().map(m => `
        <div class="msg-item ${m.to === 'Alle' ? 'broadcast' : ''} ${m.from === 'Admin' ? 'admin-note' : ''}">
            <small style="color:var(--text-dim)">${m.time} | von ${m.from}:</small><br>
            <b>${m.txt}</b>
        </div>
    `).join("");
}

async function sendMessage() {
    const input = document.getElementById("msgInput");
    const target = document.getElementById("msgTarget").value || "Admin";
    if(!input.value.trim()) return;

    const newMsg = {
        from: isAdminMode ? "Admin" : filters.companion,
        to: isAdminMode ? target : "Admin",
        txt: input.value.trim(),
        time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
    };

    CloudDB.msgs.push(newMsg);
    // Behalte nur die letzten 20 Nachrichten
    if(CloudDB.msgs.length > 20) CloudDB.msgs.shift();

    await saveToCloud();
    input.value = "";
    renderMessages();
}

function render() {
    const now = new Date();
    data.sort((a,b) => b.fD - a.fD);
    
    const playedPast = data.filter(d => d.played);
    const userHistory = playedPast.filter(m => m.begleiter.includes(filters.companion || "---"));
    
    if (userHistory.length > 0) {
        const lastVisit = userHistory[0].fD; 
        if(tickerInterval) clearInterval(tickerInterval);
        tickerInterval = setInterval(() => {
            const diff = Math.max(0, new Date() - lastVisit);
            const d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
            document.getElementById("liveTicker").innerText = `${d}t ${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
        }, 1000);
        document.getElementById("statDays").innerText = Math.floor((now - lastVisit)/86400000) + " T.";
    }

    const tbody = document.getElementById("matchTable").querySelector("tbody");
    tbody.innerHTML = data.map(m => {
        const isFuture = !m.played && m.fD > now;
        const confirmedList = m.begleiter ? m.begleiter.split(/,| und /).map(n => n.trim()).filter(n => n && n.toLowerCase() !== 'nicht im stadion') : [];
        const isUserConfirmed = confirmedList.includes(filters.companion || "");
        
        const requests = CloudDB.zusagen.filter(z => z.date === m.datum).map(z => z.user);
        const hasRequested = requests.includes(filters.companion);

        if(filters.companion && !isFuture && !isUserConfirmed) return "";

        let actionHtml = "";
        if(filters.companion) {
            if(isFuture) {
                if(isUserConfirmed) actionHtml = '<span class="name-tag tag-confirmed">BESTÄTIGT ✅</span>';
                else if(hasRequested) actionHtml = '<span class="name-tag tag-request">ANGEFRAGT...</span>';
                else actionHtml = `<button class="btn-zusage" onclick="submitZusage('${m.datum}', '${m.gegner}')">DABEI!</button>`;
            } else if(isUserConfirmed) actionHtml = '<span class="st-dot"></span> Dabei';
        } else {
            let tags = confirmedList.map(n => `<span class="name-tag tag-confirmed">${n}</span>`).join("");
            let reqs = requests.map(n => `
                <span class="name-tag tag-request">? ${n} 
                    <button class="btn-mini" style="background:#fff" onclick="handleAdminRequest('${m.datum}', '${n}', true, '${m.gegner}')">✔</button>
                    <button class="btn-mini" style="background:#fff; color:var(--red)" onclick="handleAdminRequest('${m.datum}', '${n}', false, '${m.gegner}')">✖</button>
                </span>`).join("");
            actionHtml = `<div style="display:flex; flex-direction:column;">${tags}${reqs}</div>`;
        }

        const heim = m.ort === 'H' ? m.meinVerein : m.gegner;
        const gast = m.ort === 'A' ? m.meinVerein : m.gegner;

        return `<tr class="${isFuture ? 'future-row' : ''}">
            <td style="font-size:0.7rem">${m.datum}</td>
            <td><span style="font-size:8px; padding:2px 4px; background:#334155; border-radius:3px;">${m.ort}</span></td>
            <td style="text-align:right"><b>${heim}</b> <img src="logos/${heim}.png" class="logo-img" onerror="this.style.display='none'"></td>
            <td><div class="score-box">${m.played ? (m.ort=='H'?m.tK+':'+m.tG:m.tG+':'+m.tK) : '-:-'}</div></td>
            <td style="text-align:left"><img src="logos/${gast}.png" class="logo-img" onerror="this.style.display='none'"> <b>${gast}</b></td>
            <td>${actionHtml}</td>
        </tr>`;
    }).join("");

    if(isAdminMode) {
        const comps = {};
        data.forEach(m => {
            if(m.begleiter && m.begleiter.toLowerCase() !== "nicht im stadion") {
                m.begleiter.split(/,| und /).forEach(n => {
                    const name = n.trim(); if(!name) return;
                    if(!comps[name]) comps[name] = {sp: 0, last: null};
                    if(m.played) { comps[name].sp++; if(!comps[name].last || m.fD > comps[name].last) comps[name].last = m.fD; }
                });
            }
        });
        const sortedNames = Object.keys(comps).sort();
        document.getElementById("companionSelect").innerHTML = '<option value="">Name wählen...</option>' + sortedNames.map(n => `<option value="${n}">${n}</option>`).join("");
        document.getElementById("msgTarget").innerHTML = '<option value="Alle">An Alle</option>' + sortedNames.map(n => `<option value="${n}">${n}</option>`).join("");
        document.getElementById("companionTable").querySelector("tbody").innerHTML = Object.entries(comps).sort((a,b)=>b[1].sp - a[1].sp).map(([n, s]) => `<tr><td style="padding:10px; text-align:left;"><b>${n}</b></td><td>${s.sp}x</td><td>${s.last ? Math.floor((now-s.last)/86400000)+'T.' : '-'}</td></tr>`).join("");
        document.getElementById("statCount").innerText = playedPast.length;
        document.getElementById("statTotal").innerText = data.filter(m => !m.played && m.fD > now).length;
    } else {
        document.getElementById("statCount").innerText = userHistory.length;
        document.getElementById("statTotal").innerText = data.filter(m => !m.played && m.fD > now).length;
    }
}

async function handleAdminRequest(datum, user, accept, gegner) {
    const statusTxt = accept ? "ANGENOMMEN" : "ABGELEHNT";
    CloudDB.msgs.push({
        from: "Admin", to: user, txt: `Deine Anfrage für das Spiel vs. ${gegner} wurde ${statusTxt}.`,
        time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
    });
    CloudDB.zusagen = CloudDB.zusagen.filter(z => !(z.date === datum && z.user === user));
    await saveToCloud();
    refreshData();
}

async function submitZusage(datum, gegner) {
    CloudDB.zusagen.push({ user: filters.companion, date: datum });
    CloudDB.msgs.push({
        from: filters.companion, to: "Admin", txt: `Ich möchte beim Spiel vs. ${gegner} dabei sein!`,
        time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
    });
    await saveToCloud();
    refreshData();
}

async function saveToCloud() {
    document.getElementById("statusInfo").innerText = "Speichere...";
    await fetch(DB_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(CloudDB) });
    document.getElementById("statusInfo").innerText = "Gespeichert";
}

async function clearCloud() {
    if(confirm("Cloud komplett zurücksetzen? (Löscht alle Nachrichten & Anfragen)")) {
        CloudDB = { zusagen: [], msgs: [] };
        await saveToCloud();
        refreshData();
    }
}

function copyLink() {
    const name = document.getElementById("companionSelect").value;
    if(!name) return alert("Namen wählen!");
    const url = window.location.origin + window.location.pathname + "?user=" + encodeURIComponent(name);
    navigator.clipboard.writeText(url).then(() => alert("Link kopiert!"));
}
function logout() { window.location.href = window.location.pathname; }
</script>
</body>
</html>
