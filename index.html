<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
<title>KSV – Live Manager Pro</title>
<style>
  :root{ 
    --blue:#003f8c; --red:#e30613; --bg:#0f172a; --card:#1e293b; 
    --border:#334155; --text:#f8fafc; --text-dim:#94a3b8;
    --win:#22c55e; --amber:#f59e0b;
  }
  *{box-sizing:border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent;}
  body{ margin:0; padding:10px; background: var(--bg); color:var(--text); line-height: 1.5; }
  .container { max-width: 1650px; margin: 0 auto; display: none; } 

  /* Login Overlay */
  #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); display:flex; align-items:center; justify-content:center; z-index:9999; flex-direction: column; padding: 20px; }
  .login-box { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--border); text-align:center; width: 100%; max-width: 380px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
  input[type="password"], input[type="text"], select { background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 10px; width: 100%; margin-bottom: 15px; text-align: center; }
  .btn-action { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 800; width: 100%; transition: 0.2s; }
  
  .header{ display:flex; align-items:center; justify-content:space-between; margin-bottom: 20px; background: linear-gradient(135deg, var(--blue), #001f44); padding: 25px; border-radius: 20px; border: 1px solid var(--border); }
  
  /* Messenger */
  .msg-center { background: var(--card); border: 1px solid var(--blue); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
  .msg-layout { display: grid; grid-template-columns: 220px 1fr; gap: 15px; min-height: 350px; }
  @media (max-width: 768px) { .msg-layout { grid-template-columns: 1fr; } }
  .msg-sidebar { border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; overflow-y: auto; max-height: 400px; padding-right: 10px; }
  .chat-tab { padding: 12px; border-radius: 12px; cursor: pointer; background: rgba(255,255,255,0.03); font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; }
  .chat-tab.active { background: var(--blue); border-color: #60a5fa; }
  .msg-content { display: flex; flex-direction: column; background: rgba(15, 23, 42, 0.5); border-radius: 15px; padding: 15px; border: 1px solid var(--border); }
  .msg-list { flex: 1; max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; }
  .msg-bubble { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 0.85rem; }
  .msg-bubble.me { align-self: flex-end; background: var(--blue); border-bottom-right-radius: 2px; }
  .msg-bubble.them { align-self: flex-start; background: var(--border); border-bottom-left-radius: 2px; }
  .msg-meta { font-size: 0.6rem; color: var(--text-dim); margin-top: 5px; display: block; }

  /* Admin Tables & Tags */
  .table-container { background: var(--card); border-radius: 20px; padding: 15px; border: 1px solid var(--border); overflow-x: auto; margin-bottom: 20px; }
  .match-table { width:100%; border-collapse:collapse; min-width: 600px; }
  .match-table td, .match-table th { padding: 12px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .tag-confirmed { background: var(--win); color: #000; font-weight: 800; padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; margin: 2px; display: inline-block; }
  .tag-request { background: var(--amber); color: #000; font-weight: 800; padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; margin: 2px; display: inline-flex; align-items: center; gap: 5px; }
  
  /* Status Badges */
  .status-badge { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; font-weight: 700; }
  .online { background: var(--win); color: #000; }
  .offline { background: var(--border); color: var(--text-dim); }
  .no-pw { background: var(--red); color: #fff; }

  /* Ticker */
  .ticker-card { background: var(--card); padding: 25px; border-radius: 20px; margin-bottom: 20px; border: 1px solid var(--border); text-align: center; }
  .ticker-val { font-size: 2.8rem; font-weight: 900; color: #fff; margin-bottom: 5px; }
  .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat-mini { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
  .stat-mini b { display: block; font-size: 1.3rem; color: #fff; margin-top: 5px; }
  .btn-view { background: var(--blue); color: white; border: none; padding: 3px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; font-weight: bold; }
</style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2 id="loginTitle">KSV Dashboard</h2>
        <p id="loginDesc" style="font-size: 0.8rem; color: var(--text-dim); margin-bottom: 20px;">Lade Daten...</p>
        <input type="password" id="passInput" placeholder="Passwort...">
        <button class="btn-action" onclick="handleAuth()">LOGIN</button>
    </div>
</div>

<div class="container" id="mainApp">
  <div class="header">
    <div>
        <h2 id="viewTitle">KSV LIVE MANAGER</h2>
        <div id="statusInfo" style="font-size: 0.7rem; color: var(--win);">● System bereit</div>
    </div>
    <button class="btn-action" style="width:auto; background:var(--red)" onclick="logout()">LOGOUT</button>
  </div>

  <div class="msg-center">
      <h3 style="margin:0 0 15px 0; font-size: 1rem; color: #60a5fa;">💬 NACHRICHTEN</h3>
      <div class="msg-layout">
          <div class="msg-sidebar" id="chatSidebar"></div>
          <div class="msg-content">
              <div class="msg-list" id="msgList"></div>
              <div style="display:flex; gap:10px;">
                  <input type="text" id="msgInput" style="flex:1; margin:0;" placeholder="Nachricht...">
                  <button class="btn-action" style="width:auto;" onclick="sendMessage()">SENDEN</button>
              </div>
          </div>
      </div>
  </div>

  <div class="admin-panel" id="adminTools" style="display:none; border: 1px solid var(--blue); padding: 20px; border-radius: 20px; margin-bottom: 20px;">
    <div style="display:flex; gap:10px; flex-wrap: wrap; margin-bottom:15px;">
        <select id="companionSelect" style="flex:1; margin:0;"></select>
        <button class="btn-action" style="width:auto;" onclick="copyLink()">LINK KOPIEREN</button>
        <button class="btn-action" style="width:auto; background:var(--red);" onclick="clearCloud()">RESET</button>
    </div>
  </div>

  <div class="ticker-card" id="tickerBox">
    <div id="liveTicker" class="ticker-val">00t 00h 00m 00s</div>
    <div id="tickerLabel" style="color:var(--text-dim); font-size: 0.75rem; text-transform: uppercase;">Zeit seit dem letzten Stadionbesuch</div>
  </div>

  <div class="stats-bar">
    <div class="stat-mini"><span>Besuche</span><b id="statCount">-</b></div>
    <div class="stat-mini"><span>Anfragen</span><b id="statReqs" style="color:var(--amber)">0</b></div>
    <div class="stat-mini"><span>Zukünftig</span><b id="statTotal">-</b></div>
    <div class="stat-mini"><span>ID</span><b id="statID" style="font-size:0.8rem">-</b></div>
  </div>

  <div class="table-container">
    <h3 style="margin-top:0;">📅 SPIELPLAN</h3>
    <table class="match-table" id="matchTable">
      <thead><tr><th>Datum</th><th>Ort</th><th>Gegner</th><th>Score</th><th>Begleiter / Status</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
  
  <div id="adminSections" style="display:none; margin-top:20px; display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
    <div class="table-container">
        <h3>👤 RANKING</h3>
        <table id="companionTable" style="width:100%; border-collapse:collapse; font-size: 0.85rem;">
            <thead><tr style="color:var(--text-dim); text-align:left;"><th>NAME</th><th style="text-align:center">SPIELE</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
    <div class="table-container">
        <h3>🔑 USER-STATUS & VIEW</h3>
        <table id="userTable" style="width:100%; border-collapse:collapse; font-size: 0.8rem;">
            <thead><tr style="color:var(--text-dim); text-align:left;"><th>NAME</th><th>STATUS / LAST ONLINE</th><th>AKTION</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
  </div>
</div>

<script>
const FALLBACK_ADMIN_HASH = "80f84501a359739070381373516422d369f688034d6f6e52003c200676450f3b"; 
const NPOINT_ID = "15abfbbebe2742f743b2"; 
const DB_URL = `https://api.npoint.io/${NPOINT_ID}`;

let data = [], CloudDB = { zusagen: [], msgs: [], users: {}, lastSeen: {}, adminHash: null, userIds: {}, confirmedManual: {} }, 
    filters = {companion: null}, isAdminMode = false, activeChat = "Alle";

window.onload = async () => {
    await refreshData();
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if(id && CloudDB.userIds[id]) {
        filters.companion = CloudDB.userIds[id];
        activeChat = "Admin";
        document.getElementById("loginTitle").innerText = "Moin, " + filters.companion;
        if(params.get('mode') === 'view') { showApp(false); }
    }
};

async function hash(str) {
    const msgBuffer = new TextEncoder().encode(str);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function handleAuth() {
    const pw = document.getElementById("passInput").value;
    if(!pw) return alert("Eingabe fehlt!");
    const pwHash = await hash(pw);
    const targetAdminHash = CloudDB.adminHash || FALLBACK_ADMIN_HASH;

    if(pwHash === targetAdminHash) { 
        if(!CloudDB.adminHash) { CloudDB.adminHash = pwHash; await saveToCloud(); }
        showApp(true); return; 
    }
    if(filters.companion && (!CloudDB.users[filters.companion] || CloudDB.users[filters.companion] === pwHash)) {
        if(!CloudDB.users[filters.companion]) { CloudDB.users[filters.companion] = pwHash; }
        // Last Seen Tracker
        CloudDB.lastSeen[filters.companion] = Date.now();
        await saveToCloud();
        showApp(false);
    } else { alert("Passwort falsch!"); }
}

async function showApp(isAdmin) {
    isAdminMode = isAdmin;
    document.getElementById("loginOverlay").style.display = "none";
    document.getElementById("mainApp").style.display = "block";
    if(isAdmin) {
        document.getElementById("adminTools").style.display = "block";
        document.getElementById("adminSections").style.display = "grid";
    }
    render();
    renderMessages();
}

async function refreshData() {
    try {
        const [resExcel, resCloud] = await Promise.all([fetch('daten.json?v=' + Date.now()), fetch(DB_URL)]);
        const excelJson = await resExcel.json();
        CloudDB = await resCloud.json();
        if(!CloudDB.lastSeen) CloudDB.lastSeen = {};
        if(!CloudDB.confirmedManual) CloudDB.confirmedManual = {};
        if(!CloudDB.msgs) CloudDB.msgs = [];
        data = excelJson.map(r => ({
            fD: parseFixDate(r["Datum"] || r["datum"], r["Uhrzeit"] || r["uhrzeit"]),
            datum: r["Datum"] || r["datum"], gegner: r["Gegner"], ort: (r["Ort"] || "H").toUpperCase(), 
            tK: r["Tore Kiel"] || "", tG: r["Tore Gegner"] || "", played: r["Status"] === "Abgeschlossen", 
            begleiter: (r["Begleiter"] || "").trim()
        }));
    } catch(e) { console.error(e); }
}

function parseFixDate(d, t) {
    let clean = d.includes(',') ? d.split(',')[1].trim() : d.trim();
    const p = clean.split('/');
    let dO = new Date(p[2], p[1]-1, p[0]);
    if(t) { const tp = t.replace(' Uhr','').split(':'); dO.setHours(tp[0], tp[1], 0); }
    return dO;
}

function renderMessages() {
    const sidebar = document.getElementById("chatSidebar");
    const list = document.getElementById("msgList");
    sidebar.innerHTML = "";
    const companions = [...new Set(data.flatMap(m => m.begleiter.split(/,| und /).map(n => n.trim())))].filter(n => n && n !== "nicht im stadion").sort();

    if (isAdminMode) {
        ["Alle", ...companions].forEach(u => {
            const div = document.createElement("div");
            div.className = `chat-tab ${activeChat === u ? 'active' : ''}`;
            div.innerHTML = `<span>${u}</span>`;
            div.onclick = () => { activeChat = u; renderMessages(); };
            sidebar.appendChild(div);
        });
    } else { sidebar.innerHTML = `<div class="chat-tab active">Admin</div>`; }

    let filtered = (CloudDB.msgs || []).filter(m => isAdminMode ? (m.from.includes(activeChat) || m.to === activeChat) : (m.from.includes(filters.companion) || m.to === filters.companion || m.to === "Alle"));
    list.innerHTML = filtered.map(m => `<div class="msg-bubble ${m.from.includes('Admin') === isAdminMode ? 'me' : 'them'}"><b>${m.from}</b><br>${m.txt}<span class="msg-meta">${m.time}</span></div>`).join("");
    list.scrollTop = list.scrollHeight;
}

async function sendMessage() {
    const input = document.getElementById("msgInput"); if(!input.value) return;
    const time = new Date().toLocaleDateString('de-DE') + " " + new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
    CloudDB.msgs.push({ from: isAdminMode ? `Admin < ${activeChat}` : `${filters.companion} < Admin`, to: isAdminMode ? activeChat : "Admin", txt: input.value, time: time });
    await saveToCloud(); input.value = ""; renderMessages();
}

async function approve(date, user) {
    if(!CloudDB.confirmedManual[date]) CloudDB.confirmedManual[date] = [];
    CloudDB.confirmedManual[date].push(user);
    CloudDB.zusagen = CloudDB.zusagen.filter(z => !(z.date === date && z.user === user));
    await saveToCloud(); render();
}

function render() {
    const now = Date.now();
    data.sort((a,b) => b.fD - a.fD);
    
    const comps = {};
    data.forEach(m => {
        const manual = CloudDB.confirmedManual[m.datum] || [];
        const combined = [...new Set([...m.begleiter.split(/,| und /).map(n => n.trim()), ...manual])].filter(n => n && n !== "nicht im stadion");
        if(m.played) combined.forEach(n => { if(!comps[n]) comps[n] = 0; comps[n]++; });
    });

    if(isAdminMode) {
        const sortedComps = Object.entries(comps).sort((a,b) => b[1] - a[1]);
        document.getElementById("companionTable").querySelector("tbody").innerHTML = sortedComps.map(([n, s]) => `<tr><td>${n}</td><td style="text-align:center">${s}x</td></tr>`).join("");
        
        const allNames = Object.keys(comps).sort();
        document.getElementById("companionSelect").innerHTML = allNames.map(n => `<option value="${n}">${n}</option>`).join("");
        
        document.getElementById("userTable").querySelector("tbody").innerHTML = allNames.map(u => {
            const id = Object.keys(CloudDB.userIds).find(k => CloudDB.userIds[k] === u);
            const lastTime = CloudDB.lastSeen[u];
            let status = '<span class="status-badge no-pw">KEIN PASSWORT</span>';
            let timeStr = "";

            if(CloudDB.users[u]) {
                const diff = (now - lastTime) / 1000;
                if(diff < 300) { status = '<span class="status-badge online">ONLINE</span>'; }
                else { 
                    status = '<span class="status-badge offline">OFFLINE</span>';
                    timeStr = lastTime ? `<br><small>${new Date(lastTime).toLocaleString()}</small>` : "";
                }
            }

            const viewBtn = id ? `<button class="btn-view" onclick="switchToUser('${id}')">VIEW</button>` : '';
            return `<tr><td><b>${u}</b></td><td>${status}${timeStr}</td><td>${viewBtn}<button onclick="resetUser('${u}')" style="background:var(--red); border:none; color:white; padding:2px 5px; border-radius:4px; font-size:10px; cursor:pointer;">RESET</button></td></tr>`;
        }).join("");
    }

    const tbody = document.getElementById("matchTable").querySelector("tbody");
    tbody.innerHTML = data.map(m => {
        const isFuture = !m.played && m.fD > now;
        const manual = CloudDB.confirmedManual[m.datum] || [];
        const confirmed = [...new Set([...m.begleiter.split(/,| und /).map(n => n.trim()), ...manual])].filter(n => n && n !== "nicht im stadion");
        if(filters.companion && !isFuture && !confirmed.includes(filters.companion)) return "";
        
        let statusHtml = "";
        if(isFuture) {
            const requests = CloudDB.zusagen.filter(z => z.date === m.datum).map(z => z.user);
            if(isAdminMode) {
                statusHtml = confirmed.map(n => `<span class="tag-confirmed">${n}</span>`).join("") + 
                             requests.map(n => `<span class="tag-request">${n} <button onclick="approve('${m.datum}','${n}')" style="cursor:pointer; border:none; background:#fff; border-radius:3px; color:green; font-weight:bold;">✔</button></span>`).join("");
            } else {
                if(confirmed.includes(filters.companion)) statusHtml = '<span class="tag-confirmed">BESTÄTIGT ✅</span>';
                else if(requests.includes(filters.companion)) statusHtml = '<span class="tag-request">ANGEFRAGT... ⏳</span>';
                else statusHtml = `<button class="btn-action" style="padding:5px 15px; font-size:0.7rem;" onclick="submitZusage('${m.datum}')">DABEI!</button>`;
            }
        } else { statusHtml = confirmed.map(n => `<span class="tag-confirmed">${n}</span>`).join(""); }
        return `<tr><td>${m.datum}</td><td>${m.ort}</td><td>${m.gegner}</td><td>${m.played?m.tK+':'+m.tG:'-:-'}</td><td>${statusHtml}</td></tr>`;
    }).join("");

    const userHistory = data.filter(m => m.played && confirmedCheck(m, filters.companion));
    const lastMatch = isAdminMode ? data.filter(m => m.played)[0] : userHistory[0];
    if(lastMatch) {
        const last = lastMatch.fD;
        const tick = () => {
            const diff = Math.max(0, Date.now() - last);
            const d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
            document.getElementById("liveTicker").innerText = `${d}t ${h}h ${m}m ${s}s`;
        };
        tick(); setInterval(tick, 1000);
    }
    document.getElementById("statCount").innerText = isAdminMode ? data.filter(m => m.played).length : userHistory.length;
    document.getElementById("statTotal").innerText = data.filter(m => !m.played && m.fD > now).length;
    document.getElementById("statReqs").innerText = CloudDB.zusagen.length;
    document.getElementById("statID").innerText = filters.companion ? (Object.keys(CloudDB.userIds).find(k => CloudDB.userIds[k] === filters.companion) || "-") : "ADMIN";
}

function confirmedCheck(m, user) {
    const manual = CloudDB.confirmedManual[m.datum] || [];
    const confirmed = [...new Set([...m.begleiter.split(/,| und /).map(n => n.trim()), ...manual])];
    return confirmed.includes(user);
}

function switchToUser(id) { window.location.href = window.location.pathname + "?id=" + id + "&mode=view"; }
async function resetUser(u) { if(confirm(`${u} zurücksetzen?`)) { delete CloudDB.users[u]; let id = Object.keys(CloudDB.userIds).find(k => CloudDB.userIds[k] === u); if(id) delete CloudDB.userIds[id]; await saveToCloud(); render(); } }
async function saveToCloud() { await fetch(DB_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(CloudDB) }); }
async function submitZusage(date) { CloudDB.zusagen.push({ user: filters.companion, date: date }); await saveToCloud(); render(); }
function logout() { window.location.href = window.location.pathname; }
async function copyLink() {
    const name = document.getElementById("companionSelect").value;
    let id = Object.keys(CloudDB.userIds).find(key => CloudDB.userIds[key] === name) || Math.random().toString(36).substr(2, 6);
    CloudDB.userIds[id] = name; await saveToCloud();
    navigator.clipboard.writeText(window.location.origin + window.location.pathname + "?id=" + id);
    alert("Link kopiert!");
}
async function clearCloud() { if(confirm("RESET ALL?")) { CloudDB={zusagen:[],msgs:[],users:{},adminHash:null,userIds:{},confirmedManual:{},lastSeen:{}}; await saveToCloud(); location.reload(); } }
</script>
</body>
</html>
