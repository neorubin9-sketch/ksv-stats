<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>KSV – Link Master Dashboard</title>
<style>
  :root{ 
    --blue:#003f8c; --red:#e30613; --bg:#0f172a; --card:#1e293b; 
    --border:#334155; --text:#f8fafc; --text-dim:#94a3b8;
    --win:#22c55e;
  }
  
  *{box-sizing:border-box; font-family: 'Inter', sans-serif;}
  body{ margin:0; padding:20px; background: var(--bg); color:var(--text); line-height: 1.6; }
  .container { max-width: 1650px; margin: 0 auto; display: none; } 
  
  /* Login Overlay */
  #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); display:flex; align-items:center; justify-content:center; z-index:9999; flex-direction: column; }
  .login-box { background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid var(--border); text-align:center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 320px; }
  input[type="password"], select { background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 10px; width: 100%; margin-bottom: 20px; text-align: center; font-size: 1rem; }
  .btn-action { background: var(--blue); color: white; border: none; padding: 12px 30px; border-radius: 10px; cursor: pointer; font-weight: 800; width: 100%; transition: 0.3s; }
  .btn-action:hover { opacity: 0.8; }

  /* Generator Section */
  .generator-section { background: linear-gradient(135deg, rgba(96, 165, 250, 0.1), transparent); padding: 25px; border-radius: 25px; border: 1px solid var(--blue); margin-bottom: 30px; }
  .gen-flex { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
  .gen-flex select { margin-bottom: 0; flex: 1; min-width: 200px; }
  #copyConfirm { color: var(--win); font-size: 0.8rem; font-weight: bold; margin-top: 10px; display: none; }

  /* Standard UI */
  .header{ display:flex; align-items:center; justify-content:space-between; margin-bottom:25px; background: linear-gradient(135deg, var(--blue), #001f44); padding: 30px; border-radius: 20px; border: 1px solid var(--border); }
  .badge-row { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; margin-bottom: 30px; }
  .badge-img { width: 80px; height: 80px; object-fit: contain; filter: grayscale(1) brightness(0.2); opacity: 0.3; transition: 0.5s; }
  .active-badge { filter: grayscale(0) brightness(1) !important; opacity: 1 !important; transform: scale(1.1); filter: drop-shadow(0 0 15px rgba(96, 165, 250, 0.5)); }
  .ticker-card { background: var(--card); border: 2px solid #60a5fa; border-radius: 25px; padding: 30px; margin-bottom: 30px; text-align: center; }
  .ticker-val { font-size: 2.8rem; font-weight: 900; color: #fff; font-variant-numeric: tabular-nums; }
  .main-grid { display: grid; grid-template-columns: 1fr; gap: 30px; }
  @media (min-width: 1200px) { .main-grid { grid-template-columns: 1.8fr 1.2fr; } }
  .table-container { background: var(--card); border-radius: 25px; padding: 25px; border: 1px solid var(--border); }
  .match-table { width:100%; border-collapse:collapse; table-layout: fixed; }
  .match-table th { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; padding: 15px; border-bottom: 2px solid var(--border); }
  .match-table td { padding: 15px 5px; border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: middle; text-align: center; }
  .team-cell { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 0.9rem; }
  .h-align { justify-content: flex-end; text-align: right; }
  .a-align { justify-content: flex-start; text-align: left; }
  .logo-img { width: 35px; height: 35px; object-fit: contain; flex-shrink: 0; }
  .score-box { background: #0f172a; padding: 8px 0; border-radius: 8px; width: 80px; display: inline-block; font-weight: 800; border: 1px solid var(--border); color: #fff; }
  .ort-tag { padding: 3px 8px; border-radius: 5px; font-size: 10px; font-weight: 900; background: #334155; color: #94a3b8; }
  .st-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
  .st-on { background: var(--win); box-shadow: 0 0 12px var(--win); }
  .st-off { background: #475569; opacity: 0.3; }
</style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2 style="margin-top:0;">KSV Admin Login</h2>
        <input type="password" id="passInput" placeholder="Passwort...">
        <button class="btn-action" onclick="checkLogin()">LOGIN</button>
        <p id="loginError" style="color:var(--red); font-size:0.8rem; margin-top:15px; display:none;">Falsches Passwort!</p>
    </div>
</div>

<div class="container" id="mainApp">
  <div class="header">
    <div>
        <h1 style="margin:0;">KSV <span style="color:var(--red)">LOG MASTER</span></h1>
        <div id="statusInfo" style="color:var(--text-dim); font-size: 0.9rem;">Lade Daten...</div>
    </div>
    <button class="btn-action" style="width:auto; background:var(--red)" onclick="logout()">LOGOUT</button>
  </div>

  <div class="generator-section" id="adminTools">
    <div style="font-size: 0.8rem; color: #60a5fa; font-weight: 800; text-transform: uppercase; margin-bottom: 15px;">🔗 Begleiter-Link Generator</div>
    <div class="gen-flex">
        <select id="companionSelect">
            <option value="">Begleiter auswählen...</option>
        </select>
        <button class="btn-action" style="width:auto;" onclick="copyCompanionLink()">LINK KOPIEREN</button>
    </div>
    <div id="copyConfirm">Link in Zwischenablage kopiert! ✅</div>
  </div>

  <div class="badge-row" id="badgeRow">
    <img src="10.png" id="m-10" class="badge-img"><img src="25.png" id="m-25" class="badge-img">
    <img src="50.png" id="m-50" class="badge-img"><img src="100.png" id="m-100" class="badge-img">
    <img src="250.png" id="m-250" class="badge-img"><img src="500.png" id="m-500" class="badge-img">
  </div>

  <div class="ticker-card">
    <div id="liveTicker" class="ticker-val">00t 00h 00m 00s</div>
    <div id="tickerTitle" style="color:var(--text-dim); font-size: 0.8rem; margin-top: 10px; text-transform: uppercase;">Abwesenheits-Dauer</div>
  </div>

  <div class="main-grid">
    <div class="table-container">
      <h2>📅 SPIELPLAN</h2>
      <table class="match-table" id="matchTable">
        <thead><tr><th style="width:100px">Datum</th><th style="width:60px">Ort</th><th style="text-align:right">Heim</th><th style="width:90px">Score</th><th style="text-align:left">Gast</th><th style="width:60px">Dabei</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
    <div class="table-container" id="companionSection">
        <h2>👤 BEGLEITER</h2>
        <table id="companionTable" style="width:100%; border-collapse:collapse; text-align:center;">
          <thead><tr style="color:var(--text-dim); font-size: 10px; text-align:left;"><th>NAME</th><th>SPIELE</th><th>MAX LÜCKE</th></tr></thead>
          <tbody></tbody>
        </table>
    </div>
  </div>
</div>

<script>
/** ADMIN-EINSTELLUNGEN **/
const ADMIN_PASSWORD = "KSV"; // Ändere dies nach Bedarf

let data = [], filters = {companion: null}, tickerInterval = null;

window.onload = async () => {
    const params = new URLSearchParams(window.location.search);
    const userParam = params.get('user');

    if(userParam) {
        filters.companion = decodeURIComponent(userParam);
        showApp(false); // Zeigt Begleiter-Profil direkt ohne Passwort
    }
};

function checkLogin() {
    if(document.getElementById("passInput").value === ADMIN_PASSWORD) showApp(true);
    else document.getElementById("loginError").style.display = "block";
}

async function showApp(isAdmin) {
    document.getElementById("loginOverlay").style.display = "none";
    document.getElementById("mainApp").style.display = "block";
    if(!isAdmin) {
        document.getElementById("adminTools").style.display = "none";
        document.getElementById("companionSection").style.display = "none";
        document.getElementById("statusInfo").innerText = "Profilansicht: " + filters.companion;
    } else {
        document.getElementById("statusInfo").innerText = "Admin-Kontrollzentrum";
    }
    await loadData();
}

async function loadData() {
    try {
        const res = await fetch('daten.json?v=' + Date.now()); // Cache-Buster für Live-Updates
        const json = await res.json();
        data = json.map(r => ({
            fullDate: parseD(r["Datum"] || r["datum"], r["Uhrzeit"] || r["uhrzeit"]),
            datum: r["Datum"] || r["datum"],
            gegner: (r["Gegner"] || r["gegner"] || "Unbekannt").trim(),
            meinVerein: (r["Mein Verein"] || r["mein verein"] || "Holstein Kiel").trim(),
            ort: (r["Ort"] || r["ort"] || "H").toUpperCase(),
            tK: r["Tore Kiel"] || r["tore kiel"] || 0,
            tG: r["Tore Gegner"] || r["tore gegner"] || 0,
            played: r["Tore Kiel"] !== undefined && r["Tore Kiel"] !== "",
            begleiter: r["Begleiter"] || r["begleiter"] || ""
        }));
        render();
    } catch (e) { 
        document.getElementById("statusInfo").innerHTML = "<b style='color:var(--red)'>Fehler: daten.json fehlt!</b>"; 
    }
}

function parseD(d, t) {
    let date = new Date();
    if (typeof d === "string") { const p = d.split('.'); date = new Date(p[2], p[1]-1, p[0]); }
    if (t && t.includes(':')) { const tp = t.split(':'); date.setHours(parseInt(tp[0]), parseInt(tp[1]), 0, 0); }
    return date;
}

function render() {
    const played = data.filter(d => d.played).sort((a,b) => a.fullDate - b.fullDate);
    const relevant = filters.companion ? 
        played.filter(m => m.begleiter.includes(filters.companion)) : 
        played.filter(m => m.begleiter.trim() !== "");

    if (relevant.length < 1) return;

    // Ticker
    const lastVisit = relevant[relevant.length-1].fullDate;
    if(tickerInterval) clearInterval(tickerInterval);
    tickerInterval = setInterval(() => {
        const diff = new Date() - lastVisit;
        const d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
        document.getElementById("liveTicker").innerText = `${d}t ${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
    }, 1000);

    // Badges
    [10, 25, 50, 100, 250, 500].forEach(n => {
        document.getElementById(`m-${n}`).className = relevant.length >= n ? "badge-img active-badge" : "badge-img";
    });

    // Spielplan Tabelle
    const tbody = document.getElementById("matchTable").querySelector("tbody");
    tbody.innerHTML = data.sort((a,b) => b.fullDate - a.fullDate).map(m => {
        const isDabei = m.begleiter.includes(filters.companion || "");
        if(filters.companion && !isDabei) return "";
        const isH = m.ort === "H";
        const hN = isH ? m.meinVerein : m.gegner;
        const aN = isH ? m.gegner : m.meinVerein;
        return `<tr>
            <td>${m.datum}</td><td><span class="ort-tag">${m.ort}</span></td>
            <td><div class="team-cell h-align"><span>${hN}</span><img src="${hN}.png" class="logo-img" onerror="this.style.visibility='hidden'"></div></td>
            <td><div class="score-box">${m.played ? (isH?m.tK+':'+m.tG : m.tG+':'+m.tK) : '-:-'}</div></td>
            <td><div class="team-cell a-align"><img src="${aN}.png" class="logo-img" onerror="this.style.visibility='hidden'"><span>${aN}</span></div></td>
            <td><span class="st-dot st-on"></span></td>
        </tr>`;
    }).join("");

    // Begleiter Analyse & Dropdown (Nur für Admin)
    if(!filters.companion) {
        const comps = {};
        played.forEach(m => {
            m.begleiter.split(/,| und /).forEach(n => {
                const name = n.trim(); if(!name) return;
                if(!comps[name]) comps[name] = {sp: 0, last: null, maxG: 0};
                if(comps[name].last) {
                    const g = Math.floor((m.fullDate - comps[name].last)/86400000);
                    if(g > comps[name].maxG) comps[name].maxG = g;
                }
                comps[name].sp++; comps[name].last = m.fullDate;
            });
        });

        const select = document.getElementById("companionSelect");
        select.innerHTML = '<option value="">Begleiter auswählen...</option>' + 
            Object.keys(comps).sort().map(n => `<option value="${n}">${n}</option>`).join("");

        document.getElementById("companionTable").querySelector("tbody").innerHTML = Object.entries(comps).sort((a,b)=>b[1].sp - a[1].sp).map(([n, s]) => `
            <tr style="cursor:pointer" onclick="window.location.href='?user=${encodeURIComponent(n)}'">
                <td style="padding:12px; font-weight:bold; text-align:left;">${n}</td><td>${s.sp}x</td><td style="color:var(--red)">${s.maxG} T.</td></tr>`).join("");
    }
}

function copyCompanionLink() {
    const name = document.getElementById("companionSelect").value;
    if(!name) return alert("Bitte wähle zuerst einen Namen aus!");
    const baseUrl = window.location.href.split('?')[0];
    const fullUrl = `${baseUrl}?user=${encodeURIComponent(name)}`;
    navigator.clipboard.writeText(fullUrl).then(() => {
        const msg = document.getElementById("copyConfirm");
        msg.style.display = "block";
        setTimeout(() => msg.style.display = "none", 3000);
    });
}

function logout() { window.location.href = window.location.pathname; }
</script>
</body>
</html>
