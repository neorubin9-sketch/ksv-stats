<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>⚽ Holstein Kiel Statistik Deluxe 8.2</title>
    <style>
        body { font-family: "Inter", sans-serif; background: #f8fafc; margin: 0; padding: 0 2rem 4rem; color: #2c3e50; }
        header { display: flex; flex-direction: column; align-items: center; padding: 1.5rem 0; border-bottom: 5px solid #0a3c78; margin-bottom: 20px; }
        h1 { color: #0a3c78; font-weight: 800; margin-bottom: 0.5rem; }
        .tabs { display: flex; justify-content: center; gap: 0.75rem; margin-top: 1.5rem; }
        .tab { background: #e2e8f0; border: 1px solid #cbd5e1; padding: 0.8rem 1.6rem; cursor: pointer; font-weight: 700; color: #64748b; border-radius: 12px 12px 0 0; }
        .tab.active { background: #0a3c78; color: #fff; }
        .tab-content { display: none; background: #fff; padding: 2rem; border-radius: 0 15px 15px 15px; box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
        .tab-content.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; border: 1px solid #e2e8f0; }
        th { background: #0a3c78; color: #fff; padding: 12px; text-align: center; font-size: 0.85rem; cursor: pointer; }
        td { padding: 10px; border: 1px solid #e2e8f0; text-align: center; font-size: 0.9rem; }
        tr:nth-child(even) { background-color: #f8fafc; }
        .btn { cursor: pointer; background: #0a3c78; color: #fff; padding: 12px 24px; border-radius: 8px; border: none; font-weight: 600; margin-bottom: 20px; }
        
        @keyframes blink-red {
            0% { color: #e67e22; }
            50% { color: #ff0000; font-weight: 900; transform: scale(1.1); }
            100% { color: #e67e22; }
        }
        .alarm-24h { animation: blink-red 0.8s infinite; display: inline-block; }
    </style>
</head>
<body>

    <header><h1>⚽ Holstein Kiel Statistik Deluxe 8.2</h1></header>

    <div class="tabs">
        <button class="tab active" data-tab="tab1">📋 Spiele</button>
        <button class="tab" data-tab="tab3" id="tabStats">📊 Statistiken</button>
    </div>

    <div id="tab1" class="tab-content active">
        <input type="file" id="excelInput" class="btn">
        <div id="tblSpiele"></div>
    </div>

    <div id="tab3" class="tab-content">
        <div id="statsBegleiter"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        const meinGeburtstag = "27.11.1998";
        let matches = [];
        let statsInterval;
        const $ = s => document.querySelector(s);

        function parseDate(v) {
            if (!v) return null;
            if (v instanceof Date) return v;
            let d;
            if (typeof v === "number") {
                d = new Date(Math.round((v - 25569) * 86400 * 1000));
                d.setMinutes(d.getMinutes() + d.getTimezoneOffset()); 
            } else {
                let s = String(v).replace(/^[a-zA-Z]{2,3}, /g, "").replace(/ Uhr/g, "").trim();
                const parts = s.split(/[. :/-]/);
                if (parts.length >= 3) {
                    let year = parts[2].length === 2 ? "20" + parts[2] : parts[2];
                    d = new Date(year, parts[1] - 1, parts[0], parts[3] || 0, parts[4] || 0);
                } else { d = new Date(v); }
            }
            return d;
        }

        function calculatePoints(m) {
            let t = String(m.typ || "").toUpperCase().trim();
            if (t === "S") return 3;
            if (t === "U") return 1;
            if (t === "N") return 0;
            let e = String(m.ergebnis || "");
            if (!e.includes(":")) return 0;
            const res = e.split(":");
            const k = parseInt(res[0]), g = parseInt(res[1]);
            return isNaN(k) || isNaN(g) ? 0 : (k > g ? 3 : (k === g ? 1 : 0));
        }

        function formatDuration(ms) {
            if (ms < 0) return "---";
            let s = Math.floor(ms / 1000);
            let d = Math.floor(s / 86400); s %= 86400;
            let h = Math.floor(s / 3600); s %= 3600;
            let m = Math.floor(s / 60); s %= 60;
            return (d > 0 ? d + "T " : "") + `${h}h ${m}m ${s}s`;
        }

        function importExcel(e) {
            const f = e.target.files[0];
            const r = new FileReader();
            r.onload = ev => {
                const wb = XLSX.read(ev.target.result, { type: "binary", raw: true });
                const sheetS = wb.Sheets["Spiele"] || wb.Sheets[0];
                const sRows = XLSX.utils.sheet_to_json(sheetS, { defval: "", raw: true });
                matches = sRows.map(row => {
                    const keys = Object.keys(row);
                    const getV = (n) => {
                        const k = keys.find(key => key.trim().toLowerCase() === n);
                        return k ? row[k] : "";
                    };
                    let d = getV("datum"), u = getV("uhrzeit");
                    return { 
                        datum: (typeof d === "number" && typeof u === "number") ? d + u : d + " " + u, 
                        gegner: getV("gegner"), 
                        begleiter: getV("begleiter"),
                        stadion: getV("stadion"),
                        zuschauer: getV("zuschauer"),
                        ergebnis: getV("ergebnis"),
                        typ: getV("typ")
                    };
                }).filter(m => m.datum && String(m.datum).length > 2);
                localStorage.setItem("kielMatches", JSON.stringify(matches));
                renderAll();
            };
            r.readAsBinaryString(f);
        }

        function renderBegleiterStats() {
            const heute = new Date();
            const personData = {};
            const duoData = {};
            
            matches.forEach(m => {
                const dDate = parseDate(m.datum);
                if (!dDate || dDate > heute) return;
                
                const zVal = parseFloat(String(m.zuschauer).replace(/[.,]/g, ""));
                if (isNaN(zVal) || zVal <= 0) return;

                const punkte = calculatePoints(m);
                const namen = String(m.begleiter).split(/[,;]| und /).map(n => n.trim())
                    .filter(n => n && !["ich", "nicht im stadion"].includes(n.toLowerCase()));
                
                namen.forEach(n => {
                    if (!personData[n]) personData[n] = { visits: [], points: 0, stadiums: new Set() };
                    personData[n].visits.push(dDate.getTime());
                    personData[n].points += punkte;
                    if (m.stadion) personData[n].stadiums.add(m.stadion.trim());
                });

                if (namen.length >= 2) {
                    for (let i = 0; i < namen.length; i++) {
                        for (let j = i + 1; j < namen.length; j++) {
                            const pair = [namen[i], namen[j]].sort().join(" & ");
                            duoData[pair] = (duoData[pair] || 0) + 1;
                        }
                    }
                }
            });

let list = Object.keys(personData).map(n => {
                const v = personData[n].visits.sort((a,b) => a - b);
                const einJahrInMs = 365 * 24 * 60 * 60 * 1000;
                // Zählt, wie viele Spiele die Person im letzten Jahr besucht hat
                const aktivitaetLetztesJahr = v.filter(ts => (heute.getTime() - ts) < einJahrInMs).length;

                return { 
                    name: n, 
                    count: v.length, 
                    first: v[0], 
                    last: v[v.length-1], 
                    stadiumCount: personData[n].stadiums.size,
                    schnitt: (heute.getTime() - v[0]) / v.length,
                    pps: (personData[n].points / v.length).toFixed(2),
                    recentCount: aktivitaetLetztesJahr
                };
            }).sort((a,b) => b.count - a.count || a.schnitt - b.schnitt);

            if (list.length === 0) { $("#statsBegleiter").innerHTML = "Keine Daten."; return; }

            // 1. GLÜCKSBRINGER
            let html = `<h3>🍀 Glücksbringer-Faktor</h3>
            <table><thead><tr><th>Pl.</th><th>Name</th><th>Spiele</th><th>Ø Punkte</th></tr></thead><tbody>`;
            [...list].sort((a,b) => b.pps - a.pps).slice(0, 10).forEach((d, i) => {
                html += `<tr><td>${i+1}</td><td style="font-weight:bold">${d.name}</td><td>${d.count}x</td><td style="font-weight:bold">${d.pps}</td></tr>`;
            });
            html += `</tbody></table>`;

            // 2. STADION-VARIANZ
            html += `<h3>🏟️ Groundhopping (Meiste Stadien)</h3>
            <table><thead><tr><th>Pl.</th><th>Name</th><th>Stadien</th></tr></thead><tbody>`;
            [...list].sort((a,b) => b.stadiumCount - a.stadiumCount).slice(0, 5).forEach((d, i) => {
                html += `<tr><td>${i+1}</td><td style="font-weight:bold">${d.name}</td><td>${d.stadiumCount} Stadien</td></tr>`;
            });
            html += `</tbody></table>`;

            // 3. FREQUENZ & AKTIVITÄT (Ersetzt die Prognose)
            html += `<h3>⏳ Stadion-Frequenz & Aktivität</h3>
            <table><thead><tr><th>Name</th><th>Gesamt</th><th>Ø Rhythmus</th><th>Letzte 12 Monate</th><th>Status</th></tr></thead><tbody>`;
            
            list.forEach(d => {
                let status = "☕ Gelegenheitsgast";
                let color = "#95a5a6";
                
                if (d.recentCount >= 10) { status = "👑 Stammgast"; color = "#f1c40f"; }
                else if (d.recentCount >= 3) { status = "🏟️ Regelmäßig"; color = "#27ae60"; }
                else if (d.recentCount > 0) { status = "✅ Aktiv"; color = "#2c3e50"; }

                html += `<tr>
                    <td style="font-weight:bold">${d.name}</td>
                    <td>${d.count}x</td>
                    <td style="color:#27ae60; font-family:monospace">alle ${formatDuration(d.schnitt)}</td>
                    <td>${d.recentCount} Spiele</td>
                    <td style="color:${color}; font-weight:bold; font-size:0.85rem">${status}</td>
                </tr>`;
            });
            $("#statsBegleiter").innerHTML = html + "</tbody></table>";
         $("#statsBegleiter").innerHTML = html + "</tbody></table>";
        }

        function renderSeason() {
            const heute = new Date();
            let html = `<table><thead><tr><th>Datum & Uhrzeit</th><th>Gegner</th><th>Ergebnis</th><th>Stadion</th><th>Begleiter</th></tr></thead><tbody>`;
            matches.slice().sort((a,b) => parseDate(b.datum) - parseDate(a.datum)).forEach(m => {
                const d = parseDate(m.datum);
                html += `<tr><td style="font-family: monospace;">${d ? d.toLocaleString('de-DE') : "–"}</td><td>${m.gegner}</td><td style="font-weight:bold">${m.ergebnis || "–"}</td><td>${m.stadion || "–"}</td><td>${m.begleiter}</td></tr>`;
            });
            $("#tblSpiele").innerHTML = html + "</tbody></table>";
        }

        function renderAll() { renderSeason(); renderBegleiterStats(); }

        document.querySelectorAll('.tab').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab, .tab-content').forEach(el => el.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
                clearInterval(statsInterval);
                if(btn.dataset.tab === 'tab3') { renderBegleiterStats(); statsInterval = setInterval(renderBegleiterStats, 1000); }
            });
        });

        document.addEventListener("DOMContentLoaded", () => {
            const m = localStorage.getItem("kielMatches");
            if(m) matches = JSON.parse(m);
            renderAll();
            $("#excelInput").addEventListener("change", importExcel);
        });
    </script>
</body>
</html>
