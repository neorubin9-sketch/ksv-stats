<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
<title>KSV – Dashboard Precision Fixed</title>
<style>
  :root{ 
    --blue:#003f8c; --red:#e30613; --bg:#0f172a; --card:#1e293b; 
    --border:#334155; --text:#f8fafc; --text-dim:#94a3b8;
    --win:#22c55e;
  }
  
  *{box-sizing:border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent;}
  body{ margin:0; padding:10px; background: var(--bg); color:var(--text); line-height: 1.5; }
  .container { max-width: 1650px; margin: 0 auto; display: none; } 

  @media (max-width: 600px) {
    .header { padding: 15px !important; flex-direction: column; gap: 15px; text-align: center; }
    .ticker-val { font-size: 1.8rem !important; }
    .stats-bar { grid-template-columns: 1fr 1fr !important; }
    .badge-img { width: 50px !important; height: 50px !important; }
    .match-table { font-size: 0.8rem; }
    .logo-img { width: 25px !important; height: 25px !important; }
    .score-box { width: 60px !important; font-size: 1rem !important; }
  }

  #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); display:flex; align-items:center; justify-content:center; z-index:9999; flex-direction: column; padding: 20px; }
  .login-box { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--border); text-align:center; width: 100%; max-width: 350px; }
  input[type="password"], select { background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 10px; width: 100%; margin-bottom: 20px; text-align: center; font-size: 1rem; outline: none; }
  .btn-action { background: var(--blue); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: 800; width: 100%; transition: 0.2s; }

  .header{ display:flex; align-items:center; justify-content:space-between; margin-bottom: 20px; background: linear-gradient(135deg, var(--blue), #001f44); padding: 25px; border-radius: 20px; border: 1px solid var(--border); }
  .generator-section { background: rgba(96, 165, 250, 0.05); padding: 20px; border-radius: 20px; border: 1px solid var(--blue); margin-bottom: 20px; }
  .badge-row { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
  .badge-img { width: 70px; height: 70px; object-fit: contain; filter: grayscale(1) opacity(0.2); transition: 0.5s; }
  .active-badge { filter: grayscale(0) opacity(1) !important; transform: scale(1.05); filter: drop-shadow(0 0 10px rgba(96, 165, 250, 0.5)); }

  .ticker-card { background: var(--card); border: 2px solid #60a5fa; border-radius: 20px; padding: 20px; margin-bottom: 20px; text-align: center; }
  .ticker-val { font-size: 2.5rem; font-weight: 900; color: #fff; font-variant-numeric: tabular-nums; }

  .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat-mini { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
  .stat-mini span { display: block; font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; }
  .stat-mini b { font-size: 1rem; color: #fff; }

  .main-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
  @media (min-width: 1200px) { .main-grid { grid-template-columns: 1.8fr 1.2fr; } }
  .table-container { background: var(--card); border-radius: 20px; padding: 15px; border: 1px solid var(--border); overflow-x: auto; }
  .match-table { width:100%; border-collapse:collapse; min-width: 500px; }
  .match-table th { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; padding: 10px; border-bottom: 1px solid var(--border); }
  .match-table td { padding: 12px 5px; border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: middle; text-align: center; }
  
  .team-cell { display: flex; align-items: center; gap: 8px; font-weight: 700; }
  .h-align { justify-content: flex-end; text-align: right; }
  .a-align { justify-content: flex-start; text-align: left; }
  .logo-img { width: 30px; height: 30px; object-fit: contain; }
  .score-box { background: #0f172a; padding: 5px 0; border-radius: 8px; width: 70px; display: inline-block; font-weight: 800; border: 1px solid var(--border); }
  .ort-tag { padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 900; background: #334155; color: #94a3b8; }
  .st-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .st-on { background: var(--win); box-shadow: 0 0 8px var(--win); }
  .st-off { background: #475569; opacity: 0.2; }
  
  .future-match { opacity: 0.35; filter: grayscale(0.8); }
</style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2 style="margin:0 0 20px 0;">KSV Login</h2>
        <input type="password" id="passInput" placeholder="Passwort...">
        <button class="btn-action" onclick="checkLogin()">EINLOGGEN</button>
        <p id="loginError" style="color:var(--red); font-size:0.8rem; margin-top:15px; display:none;">Falsch!</p>
    </div>
</div>

<div class="container" id="mainApp">
  <div class="header">
    <div id="statusHeader">
        <h2 style="margin:0; font-size: 1.4rem;">KSV <span style="color:var(--red)">LOG MASTER</span></h2>
        <div id="statusInfo" style="color:var(--text-dim); font-size: 0.75rem;">Daten werden geladen...</div>
    </div>
    <button class="btn-action" style="width:auto; padding: 8px 20px; background:var(--red)" onclick="logout()">LOGOUT</button>
  </div>

  <div class="generator-section" id="adminTools">
    <div style="font-size: 0.7rem; color: #60a5fa; font-weight: 800; text-transform: uppercase; margin-bottom: 10px;">Begleiter-Link kopieren</div>
    <div style="display:flex; gap:10px;">
        <select id="companionSelect" style="margin-bottom:0; flex:1;"></select>
        <button class="btn-action" style="width:auto;" onclick="copyLink()">LINK</button>
    </div>
    <div id="copyConfirm" style="font-size: 0.7rem; margin-top:5px; color:var(--win); display:none;">Kopiert! ✅</div>
  </div>

  <div class="badge-row" id="badgeRow">
    <img src="10.png" id="m-10" class="badge-img"><img src="25.png" id="m-25" class="badge-img">
    <img src="50.png" id="m-50" class="badge-img"><img src="100.png" id="m-100" class="badge-img">
    <img src="250.png" id="m-250" class="badge-img"><img src="500.png" id="m-500" class="badge-img">
  </div>

  <div class="ticker-card">
    <div id="liveTicker" class="ticker-val">00t 00h 00m 00s</div>
    <div id="tickerDesc" style="color:var(--text-dim); font-size: 0.7rem; margin-top: 5px; text-transform: uppercase;">Abwesenheit vom Stadion</div>
  </div>

  <div class="stats-bar">
    <div class="stat-mini"><span>Ø Frequenz</span><b id="statFreq">-</b></div>
    <div class="stat-mini"><span>Ø Pause</span><b id="statGap">-</b></div>
    <div class="stat-mini"><span>Max Lücke</span><b id="statMax">-</b></div>
    <div class="stat-mini"><span>Spiele</span><b id="statCount">-</b></div>
  </div>

  <div class="main-grid">
    <div class="table-container">
      <h3 style="margin-top:0; font-size: 1rem;">📅 SPIELPLAN</h3>
      <table class="match-table" id="matchTable">
        <thead><tr><th>Datum</th><th>Ort</th><th style="text-align:right">Heim</th><th>Score</th><th style="text-align:left">Gast</th><th>Dabei</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
    <div class="table-container" id="companionSection">
        <h3 style="margin-top:0; font-size: 1rem;">👤 BEGLEITER</h3>
        <table id="companionTable" style="width:100%; border-collapse:collapse;">
          <thead><tr style="color:var(--text-dim); font-size: 0.6rem; text-align:center;"><th>NAME</th><th>BESUCHE</th><th>LÜCKE</th></tr></thead>
          <tbody></tbody>
        </table>
    </div>
  </div>
</div>

<script>
const ADMIN_PASSWORD = "KSV"; 
let data = [], filters = {companion: null}, tickerInterval = null;

window.onload = async () => {
    const params = new URLSearchParams(window.location.search);
    const user = params.get('user');
    if(user) { filters.companion = decodeURIComponent(user); showApp(false); }
};

function checkLogin() {
    if(document.getElementById("passInput").value === ADMIN_PASSWORD) showApp(true);
    else document.getElementById("loginError").style.display = "block";
}

async function showApp(isAdmin) {
    document.getElementById("loginOverlay").style.display = "none";
    document.getElementById("mainApp").style.display = "block";
    if(!isAdmin) {
        document.getElementById("adminTools").style.display = "none";
        document.getElementById("companionSection").style.display = "none";
        document.getElementById("statusInfo").innerText = "Profil von " + filters.companion;
    } else {
        document.getElementById("statusInfo").innerText = "Admin-Modus";
    }
    await loadData();
}

async function loadData() {
    try {
        const res = await fetch('daten.json?v=' + Date.now());
        const json = await res.json();
        data = json.map(r => {
            const d = r["Datum"] || r["datum"] || "";
            const t = r["Uhrzeit"] || r["uhrzeit"] || "15:30";
            return {
                fD: parseAnyDate(d, t),
                datum: d, 
                gegner: (r["Gegner"] || "Unbekannt").trim(),
                meinVerein: (r["Mein Verein"] || "Holstein Kiel").trim(),
                ort: (r["Ort"] || "H").toUpperCase(),
                tK: r["Tore Kiel"] || 0, tG: r["Tore Gegner"] || 0,
                played: r["Tore Kiel"] !== undefined && r["Tore Kiel"] !== "" && r["Tore Kiel"] !== "-:-",
                begleiter: r["Begleiter"] || ""
            };
        });
        render();
    } catch (e) { document.getElementById("statusInfo").innerText = "Fehler beim Laden!"; }
}

// FIX: Robuste Datumsverarbeitung für Schrägstriche und Punkte
function parseAnyDate(dStr, tStr) {
    if (!dStr) return new Date();
    // Entfernt Wochentage wie "Sat, "
    let clean = dStr.replace(/^[a-zA-Z]{2,3},\s/, '').trim();
    
    // Trennung unabhängig von . oder /
    const parts = clean.split(/[./]/);
    let dateObj;

    if (parts.length === 3) {
        // Wir erzwingen Tag, Monat, Jahr (DD.MM.YYYY)
        const day = parseInt(parts[0]);
        const month = parseInt(parts[1]) - 1;
        const year = parseInt(parts[2]);
        dateObj = new Date(year, month, day);
    } else {
        dateObj = new Date(clean);
    }

    if (isNaN(dateObj.getTime())) return new Date();
    
    if (tStr && tStr.includes(':')) {
        const tp = tStr.split(':');
        dateObj.setHours(parseInt(tp[0]), parseInt(tp[1]), 0, 0);
    } else {
        dateObj.setHours(15, 30, 0, 0);
    }
    return dateObj;
}

function render() {
    const now = new Date();
    // Sortierung nach Datum (Neueste zuerst) - Jetzt mit fixem Datumsparser
    data.sort((a,b) => b.fD - a.fD);
    
    const playedPast = data.filter(d => d.played && d.fD <= now).sort((a,b) => a.fD - b.fD);
    const relevant = filters.companion ? 
        playedPast.filter(m => m.begleiter.includes(filters.companion)) : 
        playedPast.filter(m => m.begleiter.trim() !== "" && m.begleiter.toLowerCase() !== "nicht im stadion" && m.begleiter.toLowerCase() !== "keine zuschauer");

    if (relevant.length > 0) {
        const firstVisit = relevant[0].fD;
        const lastVisit = relevant[relevant.length-1].fD;
        
        let gaps = [];
        for(let i=1; i < relevant.length; i++) {
            gaps.push(Math.max(0, Math.floor((relevant[i].fD - relevant[i-1].fD) / 86400000)));
        }
        
        document.getElementById("statCount").innerText = relevant.length;
        if (gaps.length > 0) {
            document.getElementById("statMax").innerText = Math.max(...gaps) + " T.";
            document.getElementById("statGap").innerText = (gaps.reduce((a,b)=>a+b,0)/gaps.length).toFixed(0) + " T.";
        }
        document.getElementById("statFreq").innerText = (Math.floor((now - firstVisit)/86400000) / relevant.length).toFixed(0) + " T.";

        if(tickerInterval) clearInterval(tickerInterval);
        tickerInterval = setInterval(() => {
            let diff = new Date() - lastVisit;
            if (diff < 0) diff = 0;
            const d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
            document.getElementById("liveTicker").innerText = `${d}t ${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
        }, 1000);

        [10, 25, 50, 100, 250, 500].forEach(n => {
            const b = document.getElementById(`m-${n}`);
            if(b) b.className = relevant.length >= n ? "badge-img active-badge" : "badge-img";
        });
    }

    const tbody = document.getElementById("matchTable").querySelector("tbody");
    tbody.innerHTML = data.map(m => {
        const isFuture = m.fD > now;
        const isDabei = m.begleiter.includes(filters.companion || "");
        
        // Filter-Logik für Begleiter-Profil
        if(filters.companion && !isDabei && !isFuture) return "";
        
        const isH = m.ort === "H";
        const hN = isH ? m.meinVerein : m.gegner;
        const aN = isH ? m.gegner : m.meinVerein;
        const rowClass = isFuture ? 'future-match' : '';

        return `<tr class="${rowClass}">
            <td style="font-size:0.7rem">${m.datum}</td><td><span class="ort-tag">${m.ort}</span></td>
            <td><div class="team-cell h-align"><span>${hN}</span><img src="${hN}.png" class="logo-img" onerror="this.style.visibility='hidden'"></div></td>
            <td><div class="score-box">${(m.played && !isFuture) ? (isH ? m.tK+':'+m.tG : m.tG+':'+m.tK) : '-:-'}</div></td>
            <td><div class="team-cell a-align"><img src="${aN}.png" class="logo-img" onerror="this.style.visibility='hidden'"><span>${aN}</span></div></td>
            <td><span class="st-dot ${(m.begleiter.trim()!='' && !isFuture) ? 'st-on' : 'st-off'}"></span></td>
        </tr>`;
    }).join("");

    if(!filters.companion) {
        const comps = {};
        playedPast.forEach(m => {
            m.begleiter.split(/,| und /).forEach(n => {
                const name = n.trim(); if(!name || name.toLowerCase() === "nicht im stadion" || name.toLowerCase() === "keine zuschauer") return;
                if(!comps[name]) comps[name] = {sp: 0, last: null, maxG: 0};
                if(comps[name].last) {
                    const g = Math.floor((m.fD - comps[name].last)/86400000);
                    if(g > comps[name].maxG) comps[name].maxG = g;
                }
                comps[name].sp++; comps[name].last = m.fD;
            });
        });
        document.getElementById("companionSelect").innerHTML = '<option value="">Wähle Name...</option>' + Object.keys(comps).sort().map(n => `<option value="${n}">${n}</option>`).join("");
        document.getElementById("companionTable").querySelector("tbody").innerHTML = Object.entries(comps).sort((a,b)=>b[1].sp - a[1].sp).map(([n, s]) => {
            const curLuecke = Math.floor((now - s.last)/86400000);
            return `<tr onclick="window.location.href='?user=${encodeURIComponent(n)}'">
                <td style="padding:10px; font-weight:bold; text-align:left;">${n}</td><td>${s.sp}x</td><td style="color:var(--red)">${curLuecke} T.</td>
            </tr>`;
        }).join("");
    }
}

function copyLink() {
    const name = document.getElementById("companionSelect").value;
    if(!name) return;
    const url = window.location.href.split('?')[0] + "?user=" + encodeURIComponent(name);
    navigator.clipboard.writeText(url).then(() => {
        document.getElementById("copyConfirm").style.display = "block";
        setTimeout(() => document.getElementById("copyConfirm").style.display = "none", 2000);
    });
}
function logout() { window.location.href = window.location.pathname; }
</script>
</body>
</html>
